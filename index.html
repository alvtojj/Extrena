<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1f15;--s1:#15291d;--s2:#1d3526;--bd:#2c4734;
  --cy:#d4a843;--or:#c97b4a;--gr:#6fae6f;--ye:#e0b94f;
  --tx:#e4ede6;--mu:#7fa68d;--di:#3a5c46;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
/* HEADER */
header{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.hbadge{font-size:.72rem;color:var(--mu)}
/* TABS */
nav{background:var(--s1);border-top:1px solid var(--bd);display:flex;padding:0 .5rem;overflow-x:auto;gap:0;position:fixed;bottom:0;left:0;right:0;z-index:200;justify-content:space-around}
.tab{background:none;border:none;border-top:2px solid transparent;color:var(--mu);font-family:'Inter',sans-serif;font-size:.68rem;font-weight:500;padding:.6rem .4rem;cursor:pointer;white-space:nowrap;transition:all .15s;flex:1;text-align:center}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--cy);border-top-color:var(--cy)}
/* MAIN */
main{flex:1;padding:1.5rem;padding-bottom:5rem;max-width:1200px;margin:0 auto;width:100%}
.panel{display:none}.panel.on{display:block}
/* CARDS */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.card-t{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:.9rem}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.9rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}
/* STAT */
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:.9rem;text-align:center}
.stat .v{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;line-height:1}
.stat .l{font-size:.67rem;color:var(--mu);margin-top:.3rem;text-transform:uppercase;letter-spacing:.05em}
.v-r{color:#c4694a}.v-s{color:#3d8a8a}.v-b{color:#b8923a}.v-c{color:var(--cy)}.v-g{color:var(--gr)}.v-y{color:var(--ye)}.v-w{color:#8a9a7a}
/* FORMS */
label{display:block;font-size:.78rem;color:var(--mu);margin-bottom:.35rem;font-weight:500}
input,select,textarea{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'Inter',sans-serif;font-size:.85rem;padding:.6rem .85rem;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--cy)}
select option{background:var(--s2)}
textarea{resize:vertical}
.fr{margin-bottom:.9rem}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.9rem}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;transition:all .2s}
.btn-p{background:var(--cy);color:#0d1520}.btn-p:hover{filter:brightness(1.1)}.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}.btn-s:hover{border-color:var(--cy)}
.btn-d{background:rgba(196,105,74,.15);color:#c4694a;border:1px solid rgba(196,105,74,.3)}
.btn-sm{padding:.38rem .8rem;font-size:.78rem}
/* CHAT */
.chat-box{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:1.25rem;min-height:380px;max-height:460px;overflow-y:auto;display:flex;flex-direction:column;gap:.9rem;margin-bottom:.9rem}
.msg{max-width:88%;padding:.75rem 1rem;border-radius:10px;font-size:.85rem;line-height:1.65;white-space:pre-wrap}
.msg-u{background:var(--bd);align-self:flex-end}
.msg-a{background:rgba(61,138,138,.07);border:1px solid rgba(61,138,138,.18);align-self:flex-start}
.chat-row{display:flex;gap:.6rem;margin-bottom:.6rem}
.chat-row input{flex:1}
.quick-btns{display:flex;gap:.5rem;flex-wrap:wrap}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.tbl th{text-align:left;padding:.5rem .7rem;font-size:.67rem;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);border-bottom:1px solid var(--bd);font-weight:600}
.tbl td{padding:.65rem .7rem;border-bottom:1px solid rgba(39,61,88,.45);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02);cursor:pointer}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:.4rem;vertical-align:middle}
.tag{display:inline-block;padding:.15rem .4rem;border-radius:4px;font-size:.67rem;font-weight:600}
.t-r{background:rgba(196,105,74,.15);color:#c4694a}
.t-s{background:rgba(61,138,138,.15);color:var(--cy)}
.t-b{background:rgba(184,146,58,.15);color:#b8923a}
.t-w{background:rgba(138,154,122,.18);color:#8a9a7a}
/* AI RESPONSE */
.ai-box{background:var(--s2);border:1px solid var(--bd);border-left:3px solid var(--cy);border-radius:8px;padding:1.1rem;font-size:.85rem;line-height:1.7;white-space:pre-wrap;display:none;margin-top:.9rem}
.ai-box.on{display:block}
.spin-wrap{display:none;align-items:center;gap:.6rem;color:var(--mu);font-size:.82rem;margin-top:.9rem;padding:.75rem}
.spin-wrap.on{display:flex}
.spin{width:15px;height:15px;border:2px solid var(--bd);border-top-color:var(--cy);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
/* CHART */
.cw{position:relative;height:200px;margin-top:.9rem}
.cw-t{height:260px}
/* PROGRESS */
.pb-wrap{margin-bottom:.9rem}
.pb-lbl{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.3rem}
.pb-lbl span:first-child{color:var(--tx)}
.pb{height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .6s}
/* NOTA */
.nota{padding:.75rem;border-radius:8px;font-size:.76rem;line-height:1.6;margin-top:.75rem;color:var(--mu)}
.nota-r{background:rgba(196,105,74,.08)}
.nota-s{background:rgba(61,138,138,.08)}
.nota-b{background:rgba(184,146,58,.08)}
/* SPORT SELECTOR */
.sport-btns{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem}
/* CALENDARIO */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-grid-header{margin-bottom:5px}
.cal-dow{font-size:.68rem;color:var(--mu);text-align:center;font-weight:600;padding:.3rem 0}
.cal-celda{aspect-ratio:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:.3rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s}
.cal-celda:hover{border-color:var(--cy);transform:scale(1.04)}
.cal-vacia{background:transparent;border:none}
.cal-vacia:hover{transform:none}
.cal-num{font-size:.78rem;color:var(--tx);font-weight:700}
.cal-hoy{border-color:var(--cy);border-width:2px}
/* Estado del entrenamiento: el FONDO de la celda marca claramente hecho/pendiente, nunca se pierde el icono */
.cal-hecho{background:rgba(212,168,67,.22);border-color:rgba(212,168,67,.45)}
.cal-hecho .cal-num{color:var(--cy)}
.cal-pendiente{background:var(--s2);border-color:var(--bd)}
.cal-descanso{background:rgba(58,92,70,.35)}
@media(max-width:480px){.cal-celda{font-size:.7rem}.cal-num{font-size:.68rem}}
.sbtn{background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:.38rem .85rem;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.sbtn.on{background:var(--cy);color:#0d1520;border-color:var(--cy)}
/* PLAN */
.plan-sem{border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:1rem}
.plan-hdr{background:var(--s2);padding:.65rem 1rem;display:flex;justify-content:space-between;align-items:center}
.plan-hdr-t{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:600;color:var(--cy)}
.plan-hdr-b{font-size:.72rem;color:var(--mu)}
.plan-dia{padding:.65rem 1rem;border-top:1px solid rgba(39,61,88,.45);display:flex;gap:.8rem;align-items:flex-start;font-size:.82rem}
.plan-dn{font-weight:600;color:var(--mu);min-width:32px;font-size:.7rem;text-transform:uppercase;padding-top:2px}
.plan-dc{flex:1;line-height:1.5}
.plan-rest{color:var(--di);font-style:italic}
.plan-sp{color:var(--ye);font-weight:600}
/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.st{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700}
.ss{font-size:.82rem;color:var(--mu);margin-top:.2rem}
hr.div{border:none;border-top:1px solid var(--bd);margin:1rem 0}
/* ZONA BAR */
.zbar-wrap{margin-bottom:.5rem}
.zbar-lbl{display:flex;justify-content:space-between;font-size:.72rem;color:var(--mu);margin-bottom:.25rem}
.zbar{height:8px;background:var(--bd);border-radius:4px;overflow:hidden}
.zbar-fill{height:100%;border-radius:4px}
/* IMPORT */
.import-area{background:var(--s2);border:2px dashed var(--bd);border-radius:10px;padding:1.5rem;text-align:center;font-size:.85rem;color:var(--mu);margin-bottom:.9rem;cursor:pointer;transition:all .2s}
.import-area:hover{border-color:var(--cy);color:var(--cy)}

/* DETALLE ACTIVIDAD */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.detail-overlay.on{display:flex}
.detail-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;max-width:640px;width:100%;padding:1.5rem;margin-top:1rem}
.detail-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem}
.detail-close{background:var(--s2);border:1px solid var(--bd);color:var(--mu);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.detail-close:hover{color:var(--tx);border-color:var(--cy)}
.detail-title{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700}
.detail-sub{font-size:.8rem;color:var(--mu);margin-top:.25rem}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1rem}
.detail-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid rgba(39,61,88,.4);font-size:.82rem}
.detail-row span:first-child{color:var(--tx)}
.detail-row span:last-child{font-weight:600}
.tr-click{cursor:pointer}
.tr-click:active{background:rgba(255,255,255,.04)}
@media(max-width:768px){main{padding:1rem}.g2,.g3,.g4,.fg2,.fg3{grid-template-columns:1fr}}
</style>

<script>
if('serviceWorker' in navigator){
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(()=>new Response(''))));
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

<script>
// ─────────────────────────────────────────────
// PARSER FIT (validado contra garmin_fit_sdk oficial)
// ─────────────────────────────────────────────
// Parser FIT minimalista verificado contra el FIT SDK oficial de Garmin (campos session+record).
// Aplica escala y offset exactos por campo, igual que hace el SDK real.
// No requiere librerías externas: solo DataView nativo del navegador.

const FIT_EPOCH_MS = Date.UTC(1989, 11, 31); // FIT timestamps: segundos desde 1989-12-31 UTC

const MESG_SESSION = 18;
const MESG_RECORD = 20;

// field_def_num -> {name, scale, offset, baseTypeSize}
// Verificado contra garmin_fit_sdk.profile.Profile['messages'][18|20]['fields']
const SESSION_FIELDS = {
  253: { name: 'timestamp', scale: 1, offset: 0 },
  2:   { name: 'start_time', scale: 1, offset: 0 },
  7:   { name: 'total_elapsed_time', scale: 1000, offset: 0 },
  8:   { name: 'total_timer_time', scale: 1000, offset: 0 },
  9:   { name: 'total_distance', scale: 100, offset: 0 },
  11:  { name: 'total_calories', scale: 1, offset: 0 },
  16:  { name: 'avg_heart_rate', scale: 1, offset: 0 },
  17:  { name: 'max_heart_rate', scale: 1, offset: 0 },
  22:  { name: 'total_ascent', scale: 1, offset: 0 },
  23:  { name: 'total_descent', scale: 1, offset: 0 },
};
const RECORD_FIELDS = {
  253: { name: 'timestamp', scale: 1, offset: 0 },
  3:   { name: 'heart_rate', scale: 1, offset: 0 },
  5:   { name: 'distance', scale: 100, offset: 0 },
  6:   { name: 'speed', scale: 1000, offset: 0 },
};

// baseType (byte completo del FIT, incluye flags) -> {bytes, signed, isFloat}
function baseTypeInfo(baseType) {
  const t = baseType & 0x1f;
  switch (t) {
    case 0: return { bytes: 1, signed: false }; // enum
    case 1: return { bytes: 1, signed: true };  // sint8
    case 2: return { bytes: 1, signed: false }; // uint8
    case 0x83 & 0x1f: return { bytes: 2, signed: true }; // sint16 (3)
    case 0x84 & 0x1f: return { bytes: 2, signed: false }; // uint16 (4)
    case 0x85 & 0x1f: return { bytes: 4, signed: true }; // sint32 (5)
    case 0x86 & 0x1f: return { bytes: 4, signed: false }; // uint32 (6)
    case 7: return { bytes: 1, signed: false, isString: true }; // string
    case 0x88 & 0x1f: return { bytes: 4, signed: false, isFloat: true }; // float32 (8)
    case 0x89 & 0x1f: return { bytes: 8, signed: false, isFloat: true }; // float64 (9)
    case 10: return { bytes: 1, signed: false }; // uint8z
    case 0x8B & 0x1f: return { bytes: 2, signed: false }; // uint16z (11)
    case 0x8C & 0x1f: return { bytes: 4, signed: false }; // uint32z (12)
    case 13: return { bytes: 1, signed: false }; // byte
    case 0x8E & 0x1f: return { bytes: 8, signed: true }; // sint64 (14)
    case 0x8F & 0x1f: return { bytes: 8, signed: false }; // uint64 (15)
    default: return { bytes: 1, signed: false };
  }
}

function readRawValue(dv, offset, size, baseType, littleEndian) {
  const info = baseTypeInfo(baseType);
  if (info.isString) {
    let s = '';
    for (let i = 0; i < size; i++) {
      const c = dv.getUint8(offset + i);
      if (c === 0) break;
      s += String.fromCharCode(c);
    }
    return s;
  }
  // Si el campo definido ocupa más bytes que el tamaño base (raro, p.ej. arrays), usamos solo el primer elemento
  const n = info.bytes;
  if (info.isFloat) {
    return n === 4 ? dv.getFloat32(offset, littleEndian) : dv.getFloat64(offset, littleEndian);
  }
  if (n === 1) return info.signed ? dv.getInt8(offset) : dv.getUint8(offset);
  if (n === 2) return info.signed ? dv.getInt16(offset, littleEndian) : dv.getUint16(offset, littleEndian);
  if (n === 4) return info.signed ? dv.getInt32(offset, littleEndian) : dv.getUint32(offset, littleEndian);
  if (n === 8) {
    // BigInt para 64 bits, lo convertimos a Number (suficiente para nuestros campos, que nunca son de 8 bytes)
    const big = info.signed ? dv.getBigInt64(offset, littleEndian) : dv.getBigUint64(offset, littleEndian);
    return Number(big);
  }
  return dv.getUint8(offset);
}

// Valor "inválido" estándar FIT para cada tamaño (0xFF, 0xFFFF, 0xFFFFFFFF) — se traduce a null
function isInvalidFitValue(raw, baseType) {
  const info = baseTypeInfo(baseType);
  if (info.isString) return false;
  if (info.bytes === 1) return raw === 0xFF || raw === 0x7F;
  if (info.bytes === 2) return raw === 0xFFFF || raw === 0x7FFF;
  if (info.bytes === 4) return raw === 0xFFFFFFFF || raw === 0x7FFFFFFF || raw === -1;
  return false;
}

function parseFitBuffer(arrayBuffer) {
  const dv = new DataView(arrayBuffer);
  const headerSize = dv.getUint8(0);
  const dataSize = dv.getUint32(4, true);
  let offset = headerSize;
  const end = headerSize + dataSize;

  const localDefs = {};
  const sessions = [];
  const records = [];

  while (offset < end) {
    const recordHeader = dv.getUint8(offset);
    offset += 1;
    const isDefinition = (recordHeader & 0x40) !== 0;
    const localType = recordHeader & 0x0f;

    if (isDefinition) {
      offset += 1; // reserved
      const littleEndian = dv.getUint8(offset) === 0;
      offset += 1;
      const globalNum = dv.getUint16(offset, littleEndian);
      offset += 2;
      const numFields = dv.getUint8(offset);
      offset += 1;
      const fields = [];
      for (let i = 0; i < numFields; i++) {
        const defNum = dv.getUint8(offset); offset += 1;
        const size = dv.getUint8(offset); offset += 1;
        const baseType = dv.getUint8(offset); offset += 1;
        fields.push({ defNum, size, baseType });
      }
      // Developer fields (si los hay) — no los necesitamos pero hay que avanzar el offset si existieran
      // (campos definidos con header bit 0x20 de "developer data flag"); FIT estándar de relojes Garmin
      // normalmente no los usa para session/record básicos, así que no se gestionan aquí.
      localDefs[localType] = { globalNum, fields, littleEndian };
    } else {
      const def = localDefs[localType];
      if (!def) break;
      const msg = {};
      let fieldMap = null;
      if (def.globalNum === MESG_SESSION) fieldMap = SESSION_FIELDS;
      else if (def.globalNum === MESG_RECORD) fieldMap = RECORD_FIELDS;

      for (const f of def.fields) {
        const raw = readRawValue(dv, offset, f.size, f.baseType, def.littleEndian);
        offset += f.size;
        if (fieldMap && fieldMap[f.defNum] != null) {
          const fdef = fieldMap[f.defNum];
          if (typeof raw === 'string') {
            msg[fdef.name] = raw;
          } else if (isInvalidFitValue(raw, f.baseType)) {
            msg[fdef.name] = null;
          } else {
            msg[fdef.name] = (raw - fdef.offset) / fdef.scale;
          }
        }
      }
      if (def.globalNum === MESG_SESSION) sessions.push(msg);
      else if (def.globalNum === MESG_RECORD) records.push(msg);
    }
  }

  return { sessions, records };
}

function fitTimestampToISODate(fitTs) {
  return new Date(FIT_EPOCH_MS + fitTs * 1000).toISOString().slice(0, 10);
}

// Convierte el resultado crudo en el formato de actividad que usa la app
function fitToActivity(arrayBuffer, tipoDeporte) {
  const { sessions, records } = parseFitBuffer(arrayBuffer);
  if (!sessions.length) throw new Error('No se encontró información de sesión en el archivo FIT.');
  const s = sessions[0];

  const fecha = s.timestamp != null ? fitTimestampToISODate(s.timestamp) : new Date().toISOString().slice(0, 10);
  const duracion_min = s.total_elapsed_time != null ? +(s.total_elapsed_time / 60).toFixed(1) : (s.total_timer_time != null ? +(s.total_timer_time / 60).toFixed(1) : null);
  const distancia_m = s.total_distance != null ? s.total_distance : null;

  const act = {
    fecha,
    tipo: tipoDeporte,
    nombre: tipoDeporte + ' ' + fecha,
    duracion_min,
    distancia: tipoDeporte === 'Natación'
      ? (distancia_m != null ? +distancia_m.toFixed(0) : null)
      : (distancia_m != null ? +(distancia_m / 1000).toFixed(2) : null),
    fc_media: s.avg_heart_rate != null ? Math.round(s.avg_heart_rate) : null,
    fc_max: s.max_heart_rate != null ? Math.round(s.max_heart_rate) : null,
    desnivel: s.total_ascent != null ? Math.round(s.total_ascent) : null,
    calorias: s.total_calories != null ? Math.round(s.total_calories) : null,
    training_load: null, fitness: null, fatiga: null, intensidad: null,
    fc_z1s: null, fc_z2s: null, fc_z3s: null, fc_z4s: null, fc_z5s: null,
    race: false
  };

  if (act.tipo === 'Carrera' && act.distancia && duracion_min) {
    act.ritmo_min_km = +(duracion_min / act.distancia).toFixed(2);
  }
  if (act.tipo === 'Bicicleta' && act.distancia && duracion_min) {
    act.vel_kmh = +((act.distancia / (duracion_min / 60))).toFixed(1);
  }

  const hrVals = records.map(r => r.heart_rate).filter(v => v != null && v > 0);
  if (hrVals.length) act.fc_min = Math.min(...hrVals);

  // Zonas de FC estimadas con el mismo criterio (LTHR=172, zonas Friel) usado en el resto del historial.
  // Es una estimación con umbral fijo: Intervals.icu puede usar un LTHR distinto por deporte y dar zonas
  // ligeramente diferentes a las que veas allí.
  if (hrVals.length >= 10) {
    const LTHR = 172; // umbral de FC para carrera, usado tanto para zonas como para intensidad/carga
    // Límites de zona (ppm) tomados de la configuración real de Intervals.icu de Juanjo para carrera:
    // Z1 <=145, Z2 <=153, Z3 <=162, Z4 <=171, Z5 <=176, Z6 <=181, Z7 >181
    const ZONE_LIMITS = [145, 153, 162, 171, 176, 181];
    const zonas = [0, 0, 0, 0, 0, 0, 0]; // segundos en Z1..Z7 (1 registro ≈ 1 segundo)
    for (const hr of hrVals) {
      let z = 6; // por defecto Z7 (por encima de todos los límites)
      for (let i = 0; i < ZONE_LIMITS.length; i++) {
        if (hr <= ZONE_LIMITS[i]) { z = i; break; }
      }
      zonas[z]++;
    }
    act.fc_z1s = zonas[0]; act.fc_z2s = zonas[1]; act.fc_z3s = zonas[2];
    act.fc_z4s = zonas[3]; act.fc_z5s = zonas[4]; act.fc_z6s = zonas[5]; act.fc_z7s = zonas[6];
    act.zonas_estimadas = true; // marca para distinguir de zonas calculadas por Intervals.icu directamente

    // Intensidad y carga (Training Load) estimadas con el mismo LTHR=172.
    // Formula TSS clasica: TL = (duracion_seg * intensidad_frac^2) / 3600 * 100, verificada contra
    // 8 carreras reales de Intervals.icu con error medio de ~2.7 puntos de intensidad.
    const fcMediaSesion = hrVals.reduce((s,v)=>s+v,0) / hrVals.length;
    act.intensidad = +((fcMediaSesion / LTHR) * 100).toFixed(1);
    if (duracion_min != null) {
      const intensidadFrac = act.intensidad / 100;
      act.training_load = Math.round((duracion_min * 60 * intensidadFrac * intensidadFrac) / 3600 * 100);
    }
  }

  if (act.tipo === 'Carrera') {
    const withDist = records.filter(r => r.distance != null && r.timestamp != null);
    if (withDist.length > 1) {
      const splits = [];
      let lastKm = 0, lastTime = withDist[0].timestamp;
      for (const r of withDist) {
        const km = Math.floor(r.distance / 1000);
        if (km > lastKm) {
          const elapsedSec = r.timestamp - lastTime;
          if (elapsedSec > 0) splits.push(+(elapsedSec / 60).toFixed(2));
          lastKm = km;
          lastTime = r.timestamp;
        }
      }
      if (splits.length) act.splits_km = splits;
    }
  }

  return act;
}

// PARSER CSV INTERVALS.ICU (validado: 103/103 actividades, 615/618 campos exactos)
// ─────────────────────────────────────────────
// Parser CSV genérico (respeta comillas y comas internas) + mapeo específico de
// exportaciones de Intervals.icu a nuestro formato de actividad.

function parseCSV(text) {
  // Quitar BOM si existe
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') { /* ignore */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0] !== ''));
}

function csvRowsToObjects(rows) {
  const header = rows[0];
  return rows.slice(1).map(r => {
    const obj = {};
    header.forEach((h, i) => { obj[h] = r[i] != null ? r[i] : ''; });
    return obj;
  });
}

const INTERVALS_TIPO_MAP = { Run: 'Carrera', Swim: 'Natación', Ride: 'Bicicleta', Walk: 'Caminata', Hike: 'Senderismo' };

function num(v) {
  if (v == null || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

// Convierte las filas ya parseadas de un CSV de actividades de Intervals.icu en actividades de la app
function intervalsCSVToActivities(csvText) {
  const rows = parseCSV(csvText);
  if (rows.length < 2) throw new Error('El archivo CSV no contiene filas de datos.');
  const objs = csvRowsToObjects(rows);

  // Validar que parece un export de Intervals.icu (columnas clave presentes)
  const header = rows[0];
  const tieneColumnasEsperadas = ['start_date_local', 'type', 'moving_time', 'distance'].every(c => header.includes(c));
  if (!tieneColumnasEsperadas) {
    throw new Error('Este CSV no parece una exportación de actividades de Intervals.icu (faltan columnas esperadas).');
  }

  return objs.map(o => {
    const tipoRaw = o.type;
    const tipo = INTERVALS_TIPO_MAP[tipoRaw] || tipoRaw;
    const fecha = (o.start_date_local || '').slice(0, 10);
    const movingTimeS = num(o.moving_time);
    const duracion_min = movingTimeS != null ? +(movingTimeS / 60).toFixed(1) : null;
    const distM = num(o.distance);

    const act = {
      fecha,
      tipo,
      nombre: o.name || (tipo + ' ' + fecha),
      duracion_min,
      distancia: tipo === 'Natación'
        ? (distM != null ? +distM.toFixed(0) : null)
        : (distM != null ? +(distM / 1000).toFixed(2) : null),
      fc_media: num(o.average_heartrate) != null ? Math.round(num(o.average_heartrate)) : null,
      fc_max: num(o.max_heartrate) != null ? Math.round(num(o.max_heartrate)) : null,
      desnivel: num(o.total_elevation_gain),
      calorias: num(o.calories) != null ? Math.round(num(o.calories)) : null,
      training_load: num(o.icu_training_load) != null ? Math.round(num(o.icu_training_load)) : null,
      fitness: num(o.icu_fitness) != null ? +num(o.icu_fitness).toFixed(1) : null,
      fatiga: num(o.icu_fatigue) != null ? +num(o.icu_fatigue).toFixed(1) : null,
      intensidad: num(o.icu_intensity) != null ? +num(o.icu_intensity).toFixed(1) : null,
      fc_z1s: num(o.hr_z1_secs), fc_z2s: num(o.hr_z2_secs), fc_z3s: num(o.hr_z3_secs),
      fc_z4s: num(o.hr_z4_secs), fc_z5s: num(o.hr_z5_secs),
      race: (o.race === 'true' || o.race === 'True'),
    };

    const avgSpeed = num(o.average_speed); // m/s
    if (tipo === 'Carrera' && act.distancia && duracion_min) {
      act.ritmo_min_km = +(duracion_min / act.distancia).toFixed(2);
    }
    if (tipo === 'Bicicleta' && avgSpeed != null) {
      act.vel_kmh = +(avgSpeed * 3.6).toFixed(1);
    } else if (tipo === 'Bicicleta' && act.distancia && duracion_min) {
      act.vel_kmh = +(act.distancia / (duracion_min / 60)).toFixed(1);
    }

    return act;
  }).filter(a => a.fecha && a.tipo); // descartar filas sin fecha o tipo válidos
}

let ACTS = [...LOCAL, ...ACTS_BASE];

const carr = ()=>ACTS.filter(a=>a.tipo==='Carrera');
const nat  = ()=>ACTS.filter(a=>a.tipo==='Natación');
const bici = ()=>ACTS.filter(a=>a.tipo==='Bicicleta');

// Cálculos derivados SIEMPRE en vivo a partir de ACTS — nunca hardcodear
function calcStats(){
  const c=carr(), n=nat(), b=bici();
  const horasC=sum(c,'duracion_min')/60, horasN=sum(n,'duracion_min')/60, horasB=sum(b,'duracion_min')/60;
  const horasTot=sum(ACTS,'duracion_min')/60;
  const tlC=sum(c,'training_load'), tlN=sum(n,'training_load'), tlB=sum(b,'training_load');
  const tlTot=tlC+tlN+tlB;
  const calTot=sum(ACTS,'calorias');
  return {
    c,n,b,horasC,horasN,horasB,horasTot,tlC,tlN,tlB,tlTot,calTot,
    fcMediaC: avg(c.filter(a=>a.fc_media),'fc_media'),
    fcMediaB: avg(b.filter(a=>a.fc_media),'fc_media'),
    ritmoMedioC: avg(c.filter(a=>a.ritmo_min_km),'ritmo_min_km'),
    velMediaB: avg(b.filter(a=>a.vel_kmh),'vel_kmh'),
    distTotC: sum(c,'distancia'), distTotN: sum(n,'distancia'), distTotB: sum(b,'distancia'),
    ultimaFitness: ACTS.find(a=>a.fitness!=null)?.fitness ?? null,
    ultimaFatiga: ACTS.find(a=>a.fatiga!=null)?.fatiga ?? null,
  };
}

// Convierte distancia a km independientemente del deporte (natación viene en metros)
function distKm(a){
  if(a.tipo==='Natación') return (a.distancia||0)/1000;
  return a.distancia||0;
}

// Calcula los récords personales de UN deporte concreto (Carrera, Bicicleta o Natación).
// No mezcla unidades ni métricas entre deportes: cada uno tiene sus propios logros relevantes.
function calcLogrosPorDeporte(tipo){
  const acts = ACTS.filter(a=>a.tipo===tipo);
  const logros = [];

  if(tipo==='Carrera'){
    const conDist = acts.filter(a=>a.distancia);
    if(conDist.length){
      const a = conDist.reduce((max,c)=>c.distancia>max.distancia?c:max);
      logros.push({ id:'mayor_distancia', icono:'📏', titulo:'Mayor distancia',
        valor: a.distancia.toFixed(2)+' km', detalle: a.fecha, actividad:a });
    }
    const conRitmo = acts.filter(a=>a.ritmo_min_km);
    if(conRitmo.length){
      const a = conRitmo.reduce((min,c)=>c.ritmo_min_km<min.ritmo_min_km?c:min);
      logros.push({ id:'mejor_ritmo', icono:'⚡', titulo:'Mejor ritmo medio',
        valor: fmtMinKm(a.ritmo_min_km)+'/km', detalle: `${a.distancia}km · ${a.fecha}`, actividad:a });
    }
    let mejorKm = null;
    acts.forEach(a=>{
      if(a.splits_km) a.splits_km.forEach((s,i)=>{
        if(!mejorKm || s<mejorKm.split) mejorKm = { split:s, kmNum:i+1, actividad:a };
      });
    });
    if(mejorKm){
      logros.push({ id:'mejor_km', icono:'🚀', titulo:'Mejor kilómetro individual',
        valor: fmtMinKm(mejorKm.split)+'/km', detalle: `Km ${mejorKm.kmNum} · ${mejorKm.actividad.fecha}`, actividad:mejorKm.actividad });
    }
    const conDesnivel = acts.filter(a=>a.desnivel);
    if(conDesnivel.length){
      const a = conDesnivel.reduce((max,c)=>c.desnivel>max.desnivel?c:max);
      logros.push({ id:'mayor_desnivel', icono:'⛰️', titulo:'Mayor desnivel',
        valor: fmtInt(a.desnivel)+' m', detalle: a.fecha, actividad:a });
    }
    const conFcMax = acts.filter(a=>a.fc_max);
    if(conFcMax.length){
      const a = conFcMax.reduce((max,c)=>c.fc_max>max.fc_max?c:max);
      logros.push({ id:'fc_max', icono:'❤️', titulo:'FC máxima registrada',
        valor: a.fc_max+' ppm', detalle: a.fecha, actividad:a });
    }
    const conTL = acts.filter(a=>a.training_load);
    if(conTL.length){
      const a = conTL.reduce((max,c)=>c.training_load>max.training_load?c:max);
      logros.push({ id:'mayor_carga', icono:'🔋', titulo:'Sesión de mayor carga',
        valor: a.training_load+' TL', detalle: a.fecha, actividad:a });
    }
    // FC media más baja — mejor eficiencia aeróbica (corazón más tranquilo al mismo esfuerzo)
    const conFcMedia = acts.filter(a=>a.fc_media);
    if(conFcMedia.length){
      const a = conFcMedia.reduce((min,c)=>c.fc_media<min.fc_media?c:min);
      logros.push({ id:'fc_media_baja', icono:'💚', titulo:'FC media más baja',
        valor: a.fc_media+' ppm', detalle: `${a.distancia}km · ${a.fecha}`, actividad:a });
    }
    // Sesión más aeróbica: mayor % de tiempo en Z1-Z2
    const conZonasCar = acts.filter(a=>a.fc_z1s!=null);
    if(conZonasCar.length){
      const pctAer = a=>{ const z1=a.fc_z1s||0,z2=a.fc_z2s||0,tot=[1,2,3,4,5,6,7].reduce((s,i)=>s+(a['fc_z'+i+'s']||0),0); return tot?((z1+z2)/tot*100):0; };
      const a = conZonasCar.reduce((max,c)=>pctAer(c)>pctAer(max)?c:max);
      logros.push({ id:'mas_aerobica', icono:'🫁', titulo:'Sesión más aeróbica',
        valor: pctAer(a).toFixed(1)+'% en Z1-Z2', detalle: `${a.distancia}km · ${a.fecha}`, actividad:a });
    }
  }

  if(tipo==='Bicicleta'){
    const conDist = acts.filter(a=>a.distancia);
    if(conDist.length){
      const a = conDist.reduce((max,c)=>c.distancia>max.distancia?c:max);
      logros.push({ id:'mayor_distancia', icono:'📏', titulo:'Mayor distancia',
        valor: a.distancia.toFixed(1)+' km', detalle: a.fecha, actividad:a });
    }
    const conDuracion = acts.filter(a=>a.duracion_min);
    if(conDuracion.length){
      const a = conDuracion.reduce((max,c)=>c.duracion_min>max.duracion_min?c:max);
      logros.push({ id:'sesion_larga', icono:'⏱️', titulo:'Sesión más larga',
        valor: fmtH(a.duracion_min/60), detalle: a.fecha, actividad:a });
    }
    const conVel = acts.filter(a=>a.vel_kmh);
    if(conVel.length){
      const a = conVel.reduce((max,c)=>c.vel_kmh>max.vel_kmh?c:max);
      logros.push({ id:'mayor_velocidad', icono:'💨', titulo:'Mayor velocidad media',
        valor: a.vel_kmh+' km/h', detalle: a.fecha, actividad:a });
    }
    const conDesnivel = acts.filter(a=>a.desnivel);
    if(conDesnivel.length){
      const a = conDesnivel.reduce((max,c)=>c.desnivel>max.desnivel?c:max);
      logros.push({ id:'mayor_desnivel', icono:'⛰️', titulo:'Mayor desnivel',
        valor: fmtInt(a.desnivel)+' m', detalle: a.fecha, actividad:a });
    }
    const conFcMax = acts.filter(a=>a.fc_max);
    if(conFcMax.length){
      const a = conFcMax.reduce((max,c)=>c.fc_max>max.fc_max?c:max);
      logros.push({ id:'fc_max', icono:'❤️', titulo:'FC máxima registrada',
        valor: a.fc_max+' ppm', detalle: a.fecha, actividad:a });
    }
    const conTL = acts.filter(a=>a.training_load);
    if(conTL.length){
      const a = conTL.reduce((max,c)=>c.training_load>max.training_load?c:max);
      logros.push({ id:'mayor_carga', icono:'🔋', titulo:'Sesión de mayor carga',
        valor: a.training_load+' TL', detalle: a.fecha, actividad:a });
    }
    // FC media más baja — mejor base aeróbica en bici
    const conFcMediaB = acts.filter(a=>a.fc_media);
    if(conFcMediaB.length){
      const a = conFcMediaB.reduce((min,c)=>c.fc_media<min.fc_media?c:min);
      logros.push({ id:'fc_media_baja', icono:'💚', titulo:'FC media más baja',
        valor: a.fc_media+' ppm', detalle: `${a.distancia}km · ${a.fecha}`, actividad:a });
    }
    // Sesión más aeróbica en bici (% tiempo Z1-Z2)
    const conZonasBici = acts.filter(a=>a.fc_z1s!=null);
    if(conZonasBici.length){
      const pctAerB = a=>{ const z1=a.fc_z1s||0,z2=a.fc_z2s||0,tot=[1,2,3,4,5,6,7].reduce((s,i)=>s+(a['fc_z'+i+'s']||0),0); return tot?((z1+z2)/tot*100):0; };
      const a = conZonasBici.reduce((max,c)=>pctAerB(c)>pctAerB(max)?c:max);
      logros.push({ id:'mas_aerobica', icono:'🫁', titulo:'Sesión más aeróbica',
        valor: pctAerB(a).toFixed(1)+'% en Z1-Z2', detalle: `${a.distancia}km · ${a.fecha}`, actividad:a });
    }
  }

  if(tipo==='Natación'){
    const conDist = acts.filter(a=>a.distancia);
    if(conDist.length){
      const a = conDist.reduce((max,c)=>c.distancia>max.distancia?c:max);
      logros.push({ id:'mayor_distancia', icono:'📏', titulo:'Mayor distancia',
        valor: fmtInt(a.distancia)+' m', detalle: a.fecha, actividad:a });
    }
    const conDuracion = acts.filter(a=>a.duracion_min);
    if(conDuracion.length){
      const a = conDuracion.reduce((max,c)=>c.duracion_min>max.duracion_min?c:max);
      logros.push({ id:'sesion_larga', icono:'⏱️', titulo:'Sesión más larga',
        valor: fmtH(a.duracion_min/60), detalle: a.fecha, actividad:a });
    }
    const conTL = acts.filter(a=>a.training_load);
    if(conTL.length){
      const a = conTL.reduce((max,c)=>c.training_load>max.training_load?c:max);
      logros.push({ id:'mayor_carga', icono:'🔋', titulo:'Sesión de mayor carga',
        valor: a.training_load+' TL', detalle: a.fecha, actividad:a });
    }
    const conCal = acts.filter(a=>a.calorias);
    if(conCal.length){
      const a = conCal.reduce((max,c)=>c.calorias>max.calorias?c:max);
      logros.push({ id:'mayor_calorias', icono:'🔥', titulo:'Más calorías en una sesión',
        valor: fmtInt(a.calorias)+' kcal', detalle: a.fecha, actividad:a });
    }
  }

  return logros;
}


function fmtH(h){ if(h==null) return '—'; const hh=Math.floor(h), mm=Math.round((h-hh)*60); return mm>0 ? hh+'h'+mm+'m' : hh+'h'; }
function fmtMinKm(v){ if(v==null) return '—'; const m=Math.floor(v), s=Math.round((v-m)*60); return m+':'+String(s).padStart(2,'0'); }
function fmtInt(n){ return n==null ? '—' : Math.round(n).toLocaleString('es-ES'); }

const fmt = (n,d=1)=>n==null?'—':(+n).toFixed(d);

const avg = (arr,k)=>{const v=arr.filter(a=>a[k]!=null);return v.length?sum(v,k)/v.length:null};

// Calcula zonas agregadas reales (suma de segundos en cada zona) para un conjunto de actividades.
// Detecta automáticamente si hay datos de Z6/Z7 en el conjunto para mostrar 5 o 7 zonas.
function zonasAgregadas(actividades){
  const campos = ['fc_z1s','fc_z2s','fc_z3s','fc_z4s','fc_z5s','fc_z6s','fc_z7s'];
  const sumas = campos.map(c => actividades.reduce((s,a)=>s+(a[c]||0),0));
  const nZonas = (sumas[5]>0 || sumas[6]>0) ? 7 : 5;
  const segs = sumas.slice(0,nZonas);
  const tot = segs.reduce((s,v)=>s+v,0) || 1;
  const horas = segs.map(s => +(s/3600).toFixed(2));
  const pcts = segs.map(s => +((s/tot)*100).toFixed(1));
  return { labels: ZL_FULL.slice(0,nZonas), colors: ZC_FULL.slice(0,nZonas), horas, pcts, nZonas };
}

async function callIA(prompt, loadId, respId){
  if(!getApiKey()){ mostrarModalApiKey('Necesitas una API key para usar el Entrenador IA.'); return; }
  const load=document.getElementById(loadId), resp=document.getElementById(respId);
  if(load) load.classList.add('on');

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:buildCtx(),
        messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const txt=d.content?.map(b=>b.text||'').join('')||'Sin respuesta';
    if(resp){resp.textContent=txt;resp.classList.add('on');}

  }catch(e){
    const msg='❌ Error: '+e.message;
    if(resp){resp.textContent=msg;resp.classList.add('on');}
  }finally{
    if(load) load.classList.remove('on');
  }
}

// Calcula el TSB (Fitness-Fatiga) de las últimas N sesiones con datos, y detecta racha de fatiga sostenida
function calcAlertaSobreentrenamiento(){
  const conForma = ACTS.filter(a => a.fitness!=null && a.fatiga!=null)
    .sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
  if(conForma.length < 3) return null;
  const ultimas = conForma.slice(0, 5);
  const tsbs = ultimas.map(a => a.fitness - a.fatiga);
  const tsbMedio = tsbs.reduce((s,v)=>s+v,0) / tsbs.length;
  const todasNegativasFuerte = tsbs.filter(t => t < -10).length >= 3;
  if(tsbMedio < -12 || todasNegativasFuerte){
    return { tsbMedio: +tsbMedio.toFixed(1), nivel: tsbMedio < -18 ? 'alta' : 'moderada' };
  }
  return null;
}

// Calcula el resumen de la semana natural anterior (lunes a domingo) para mostrarlo el lunes siguiente
function calcResumenSemanal(hoyUTC){
  const diaSemana = hoyUTC.getUTCDay(); // 0=domingo,1=lunes...
  if(diaSemana !== 1) return null; // solo se muestra los lunes
  const finSemanaPasada = new Date(hoyUTC); finSemanaPasada.setUTCDate(finSemanaPasada.getUTCDate()-1); // domingo anterior
  const inicioSemanaPasada = new Date(finSemanaPasada); inicioSemanaPasada.setUTCDate(inicioSemanaPasada.getUTCDate()-6); // lunes anterior

  const enRango = a => {
    const f = new Date(a.fecha+'T00:00:00Z');
    return f >= inicioSemanaPasada && f <= finSemanaPasada;
  };
  const semana = ACTS.filter(enRango);
  if(!semana.length) return null;

  const c = semana.filter(a=>a.tipo==='Carrera'), n = semana.filter(a=>a.tipo==='Natación'), b = semana.filter(a=>a.tipo==='Bicicleta');
  return {
    n: semana.length,
    horas: sum(semana,'duracion_min')/60,
    km_carrera: sum(c,'distancia'),
    km_bici: sum(b,'distancia'),
    m_nat: sum(n,'distancia'),
    tl: sum(semana,'training_load'),
    inicio: inicioSemanaPasada.toISOString().slice(0,10),
    fin: finSemanaPasada.toISOString().slice(0,10),
  };
}

async function enviarChat(){

const LOGROS_TIPO_MAP = { carrera:'Carrera', bicicleta:'Bicicleta', natacion:'Natación' };

const LOGROS_COLOR_MAP = { carrera:'#c4694a', bicicleta:'#b8923a', natacion:'#3d8a8a' };

function renderLogrosDeporte(deporteId){
  const tipo = LOGROS_TIPO_MAP[deporteId];
  const cont = document.getElementById('logros-grid');
  const titulo = document.getElementById('logros-titulo');
  if(!cont) return;
  titulo.textContent = `${LOGROS_EMOJI_MAP[deporteId]} Récords — ${tipo}`;
  const color = LOGROS_COLOR_MAP[deporteId];

  const logros = calcLogrosPorDeporte(tipo);
  if(!logros.length){
    cont.innerHTML = `<div style="font-size:.82rem;color:var(--mu);grid-column:1/-1">Aún no hay suficientes datos de ${tipo.toLowerCase()} para calcular récords.</div>`;
    return;
  }
  cont.innerHTML = logros.map(l => `
    <div class="logro-card" data-logro-id="${l.id}" style="background:var(--s2);border:1px solid var(--bd);border-left:3px solid ${color};border-radius:10px;padding:.9rem;cursor:pointer;transition:border-color .15s">
      <div style="font-size:1.4rem;margin-bottom:.4rem">${l.icono}</div>
      <div style="font-size:.7rem;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem">${l.titulo}</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--cy);margin-bottom:.2rem">${l.valor}</div>
      <div style="font-size:.72rem;color:var(--mu)">${l.detalle}</div>
    </div>`).join('');

  cont.querySelectorAll('.logro-card').forEach(card=>{
    card.addEventListener('mouseenter', ()=>{ card.style.borderColor = 'var(--cy)'; });
    card.addEventListener('mouseleave', ()=>{ card.style.borderColor = 'var(--bd)'; });
    card.addEventListener('click', ()=>{
      const id = card.dataset.logroId;
      const logro = logros.find(l=>l.id===id);
      if(logro){
        window._histDatos = [logro.actividad];
        openDetail(0);
      }
    });
  });
}



function renderComparativaPeriodos(){
  const cont = document.getElementById('comp-resultado');
  if(!cont) return;
  const semSel = document.getElementById('comp-semanas');
  const nSemParsed = semSel ? parseInt(semSel.value) : NaN;
  const nSem = Number.isFinite(nSemParsed) && nSemParsed>0 ? nSemParsed : 4;
  const diasRango = nSem * 7;

  const hoy = new Date(); hoy.setHours(23,59,59,999);
  const inicioActual = new Date(hoy); inicioActual.setDate(inicioActual.getDate() - diasRango);
  const inicioAnterior = new Date(inicioActual); inicioAnterior.setDate(inicioAnterior.getDate() - diasRango);

  const enRango = (fechaStr, desde, hasta) => {
    const f = new Date(fechaStr);
    return f >= desde && f <= hasta;
  };

  const actual = ACTS.filter(a => enRango(a.fecha, inicioActual, hoy));
  const anterior = ACTS.filter(a => enRango(a.fecha, inicioAnterior, inicioActual));

  function resumenPeriodo(acts){
    const c = acts.filter(a=>a.tipo==='Carrera'), n = acts.filter(a=>a.tipo==='Natación'), b = acts.filter(a=>a.tipo==='Bicicleta');
    return {
      n: acts.length,
      horas: sum(acts,'duracion_min')/60,
      km_carrera: sum(c,'distancia'),
      km_bici: sum(b,'distancia'),
      m_nat: sum(n,'distancia'),
      tl: sum(acts,'training_load'),
      ritmo_carrera: avg(c.filter(a=>a.ritmo_min_km),'ritmo_min_km'),
      fc_media_carrera: avg(c.filter(a=>a.fc_media),'fc_media'),
    };
  }

  const rActual = resumenPeriodo(actual);
  const rAnterior = resumenPeriodo(anterior);

  function filaComparativa(label, vActual, vAnterior, fmt, invertido){
    const hay = vActual!=null && vAnterior!=null && vAnterior!==0;
    const diff = hay ? vActual - vAnterior : null;
    const pctDiff = hay ? (diff/Math.abs(vAnterior))*100 : null;
    let flecha = '', color = 'var(--mu)';
    if(pctDiff!=null && Math.abs(pctDiff)>=1){
      const mejora = invertido ? pctDiff<0 : pctDiff>0;
      flecha = pctDiff>0 ? '▲' : '▼';
      color = mejora ? 'var(--cy)' : '#c4622f';
    }
    return `<div class="detail-row">
      <span>${label}</span>
      <span style="display:flex;gap:.6rem;align-items:center">
        <span style="color:var(--mu);font-size:.78rem">${fmt(vAnterior)} → </span>
        <span style="font-weight:700">${fmt(vActual)}</span>
        ${pctDiff!=null && Math.abs(pctDiff)>=1 ? `<span style="color:${color};font-size:.76rem;font-weight:600">${flecha} ${Math.abs(pctDiff).toFixed(0)}%</span>` : ''}
      </span>
    </div>`;
  }

  const f0 = v => v==null?'—':fmtInt(v);
  const f1 = v => v==null?'—':v.toFixed(1);
  const fH = v => v==null?'—':fmtH(v);
  const fPace = v => v==null?'—':fmtMinKm(v)+'/km';

  cont.innerHTML = `
    <div style="font-size:.72rem;color:var(--mu);margin-bottom:.75rem">
      Actual: ${inicioActual.toISOString().slice(0,10)} → ${hoy.toISOString().slice(0,10)} ·
      Anterior: ${inicioAnterior.toISOString().slice(0,10)} → ${inicioActual.toISOString().slice(0,10)}
    </div>
    ${filaComparativa('Actividades totales', rActual.n, rAnterior.n, f0)}
    ${filaComparativa('Horas entrenadas', rActual.horas, rAnterior.horas, fH)}
    ${filaComparativa('km en carrera', rActual.km_carrera, rAnterior.km_carrera, f1)}
    ${filaComparativa('km en bicicleta', rActual.km_bici, rAnterior.km_bici, f0)}
    ${filaComparativa('Metros en natación', rActual.m_nat, rAnterior.m_nat, f0)}
    ${filaComparativa('Carga total (TL)', rActual.tl, rAnterior.tl, f0)}
    ${filaComparativa('Ritmo medio carrera', rActual.ritmo_carrera, rAnterior.ritmo_carrera, fPace, true)}
    ${filaComparativa('FC media carrera', rActual.fc_media_carrera, rAnterior.fc_media_carrera, v=>v==null?'—':Math.round(v)+'ppm', true)}
  `;
}

function initDatosCharts(){
  const co={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:'#6b8aaa',font:{size:9},maxTicksLimit:12},grid:{color:'#273d58'}},
            y:{ticks:{color:'#6b8aaa'},grid:{color:'#273d58'}}}};
  const coRev={...co,scales:{...co.scales,y:{...co.scales.y,reverse:true}}};
  const makeLine=(id,labels,data,color,data2,color2,minY,maxY,rev,isPace)=>{
    const el=document.getElementById(id);if(!el||el._ch)return;
    const ds=[{label:'',data,borderColor:color,backgroundColor:color+'22',tension:.4,fill:true,pointBackgroundColor:color,pointRadius:4}];
    if(data2) ds.push({label:'Meta 5:36',data:data2,borderColor:'rgba(212,168,67,.6)',borderDash:[5,5],pointRadius:0});
    const opts={...( rev?coRev:co),plugins:{legend:{display:!!data2,labels:{color:'#6b8aaa',font:{size:10}}},
      tooltip: isPace ? { callbacks: { label: (ctx)=>fmtMinKm(ctx.parsed.y)+' /km' } } : undefined}};
    if(minY!=null) opts.scales={...opts.scales,y:{...opts.scales.y,min:minY,max:maxY,
      ticks: isPace ? {...opts.scales.y.ticks, callback:(v)=>fmtMinKm(v)} : opts.scales.y.ticks}};
    el._ch=new Chart(el.getContext('2d'),{type:'line',data:{labels,datasets:ds},options:opts});
  };
  const makeBar=(id,labels,data,colors,horiz)=>{
    const el=document.getElementById(id);if(!el||el._ch)return;
    const opts=horiz?{...co,indexAxis:'y'}:{...co};
    el._ch=new Chart(el.getContext('2d'),{type:'bar',
      data:{labels,datasets:[{data,backgroundColor:typeof colors==='string'?data.map(()=>colors):colors,borderRadius:3}]},
      options:opts});
  };
  const makeDoughnut=(id,labels,data,bgs)=>{
    const el=document.getElementById(id);if(!el||el._ch)return;
    el._ch=new Chart(el.getContext('2d'),{type:'doughnut',
      data:{labels,datasets:[{data,backgroundColor:bgs,borderColor:'transparent'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#6b8aaa',font:{size:10},padding:8}}}}});
  };

  // Forma
  const fd=ACTS.filter(a=>a.fitness).slice(0,40).reverse();
  ['c-forma','c-forma2'].forEach(id=>{
    const el=document.getElementById(id);if(!el||el._ch)return;
    el._ch=new Chart(el.getContext('2d'),{type:'line',data:{labels:fd.map(a=>a.fecha.slice(5)),datasets:[
      {label:'Fitness',data:fd.map(a=>a.fitness),borderColor:'#3d8a8a',tension:.4,fill:false,pointRadius:2},
      {label:'Fatiga', data:fd.map(a=>a.fatiga), borderColor:'#c4694a',tension:.4,fill:false,pointRadius:2},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b8aaa',font:{size:10}}}},
      scales:{x:{ticks:{color:'#6b8aaa',font:{size:9},maxTicksLimit:10},grid:{color:'#273d58'}},y:{ticks:{color:'#6b8aaa'},grid:{color:'#273d58'}}}}});
  });

  // Donuts
  makeDoughnut('c-dist-n',['Bici ('+bici().length+')','Nat ('+nat().length+')','Carr ('+carr().length+')'],[bici().length,nat().length,carr().length],['#b8923a','#3d8a8a','#c4694a']);
  const tl_b=sum(bici(),'training_load'),tl_n=sum(nat(),'training_load'),tl_c=sum(carr(),'training_load');
  makeDoughnut('c-dist-tl',['Bici 59%','Nat 35%','Carr 6%'],[tl_b,tl_n,tl_c],['#b8923a','#3d8a8a','#c4694a']);

  // Ritmo carrera obj
  const cr=ACTS.filter(a=>a.tipo==='Carrera'&&a.ritmo_min_km&&a.ritmo_min_km<8).reverse();
  makeLine('c-ritmo-obj',cr.map(a=>a.fecha.slice(5)),cr.map(a=>a.ritmo_min_km),'#c4694a',cr.map(()=>5.60),'green',5.3,6.5,true,true);

  // Ritmo carrera completo
  makeLine('c-ritmo-run',cr.map(a=>a.fecha.slice(5)),cr.map(a=>a.ritmo_min_km),'#c4694a',cr.map(()=>5.60),'green',5.3,6.5,true,true);

  // TL carrera
  const rTL=ACTS.filter(a=>a.tipo==='Carrera'&&a.training_load).reverse();
  makeBar('c-tl-run',rTL.map(a=>a.fecha.slice(5)),rTL.map(a=>a.training_load),'rgba(196,105,74,.8)');

  // Vel bici
  const bVel=ACTS.filter(a=>a.tipo==='Bicicleta'&&a.vel_kmh).reverse();
  makeBar('c-vel-bike',bVel.map(a=>a.fecha.slice(5)),bVel.map(a=>a.vel_kmh),'rgba(184,146,58,.8)');

  // Volumen semanal bici
  const bM={};
  ACTS.filter(a=>a.tipo==='Bicicleta').forEach(a=>{
    const d=new Date(a.fecha),w=new Date(d);w.setDate(d.getDate()-d.getDay());
    const k=w.toISOString().slice(0,10);bM[k]=(bM[k]||0)+(a.distancia||0);
  });
  const bK=Object.keys(bM).sort().slice(-16);
  makeBar('c-bici-sem',bK.map(k=>k.slice(5)),bK.map(k=>+bM[k].toFixed(0)),'rgba(184,146,58,.75)');

  // TL bici
  const bTL=ACTS.filter(a=>a.tipo==='Bicicleta'&&a.training_load).slice(0,30).reverse();
  makeBar('c-tl-bike',bTL.map(a=>a.fecha.slice(5)),bTL.map(a=>a.training_load),'rgba(184,146,58,.75)');

  // Dist natación
  const nD=ACTS.filter(a=>a.tipo==='Natación'&&a.distancia).reverse();
  makeLine('c-dist-swim',nD.map(a=>a.fecha.slice(5)),nD.map(a=>a.distancia),'#3d8a8a',nD.map(()=>2224),null,null,null,false);

  // TL natación
  const nTL=ACTS.filter(a=>a.tipo==='Natación'&&a.training_load).reverse();
  makeBar('c-tl-swim',nTL.map(a=>a.fecha.slice(5)),nTL.map(a=>a.training_load),'rgba(61,138,138,.75)');
}

// SISTEMA DE PLANES MÚLTIPLES (con nombre, cada uno independiente)
// ─────────────────────────────────────────────
function getPlanes(){
  const raw = localStorage.getItem('trainai_planes');
  if(raw){
    try{ return JSON.parse(raw); }catch(e){}
  }
  // Migración: si existía el plan antiguo de una sola entrada, lo convertimos
  const legacy = localStorage.getItem('trainai_plan');
  const planes = [{ id:'plan-verano-2026', nombre:'Plan verano 2026 — Don Benito', texto: legacy || PLAN_DEFAULT_TEXT, chat:[] }];
  guardarPlanes(planes);
  return planes;
}
function guardarPlanes(planes){
  localStorage.setItem('trainai_planes', JSON.stringify(planes));
}
function getPlanActivoId(){
  return localStorage.getItem('trainai_plan_activo') || getPlanes()[0].id;
}
function setPlanActivoId(id){
  localStorage.setItem('trainai_plan_activo', id);
}
function getPlanActivo(){
  const planes = getPlanes();
  return planes.find(p=>p.id===getPlanActivoId()) || planes[0];
}
function getPlanTexto(){
  return getPlanActivo().texto;
}
function setPlanTexto(txt){
  const planes = getPlanes();
  const activo = planes.find(p=>p.id===getPlanActivoId());
  if(activo) activo.texto = txt;
  guardarPlanes(planes);
}
function crearPlan(nombre, textoBase){
  const planes = getPlanes();
  const id = 'plan-'+Date.now();
  planes.push({ id, nombre, texto: textoBase || ('# '+nombre+'\nPeriodo: por definir\nObjetivo principal: por definir\n\n## Semana 1\n- Lun: Descanso'), chat:[] });
  guardarPlanes(planes);
  setPlanActivoId(id);
  return id;
}
function borrarPlan(id){
  let planes = getPlanes();
  if(planes.length<=1){ alert('Debe quedar al menos un plan.'); return; }
  planes = planes.filter(p=>p.id!==id);
  guardarPlanes(planes);
  if(getPlanActivoId()===id) setPlanActivoId(planes[0].id);
}
function renombrarPlan(id, nuevoNombre){
  const planes = getPlanes();
  const p = planes.find(x=>x.id===id);
  if(p) p.nombre = nuevoNombre;
  guardarPlanes(planes);
}
function getPlanChat(){
  return getPlanActivo().chat || [];
}
function setPlanChat(chat){
  const planes = getPlanes();
  const activo = planes.find(p=>p.id===getPlanActivoId());
  if(activo) activo.chat = chat;
  guardarPlanes(planes);
}

// Parser simple: convierte el markdown del plan en HTML con el mismo estilo visual de antes
const MESES_MAP = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
const DIAS_MAP = {Lun:0,Mar:1,Mié:2,Jue:3,Vie:4,Sáb:5,Dom:6};

// Extrae la fecha de inicio de un encabezado de semana tipo "Semana 1 · 22-28 jun" o "3-7 ago Punta Umbría"
// y devuelve {start: Date, mes: numero} o null si no se puede parsear
function parseFechaSemana(headerTxt, anioRef){
  // Cubre "22-28 jun" (mismo mes) y "29 jun–5 jul" (cruce de mes)
  const m = headerTxt.match(/(\d{1,2})\s*(ene|feb|mar|abr|may|jun|jul|ago|sep|oct|nov|dic)?[-–]\d{1,2}\s*(ene|feb|mar|abr|may|jun|jul|ago|sep|oct|nov|dic)/i);
  if(!m) return null;
  const diaIni = parseInt(m[1]);
  const mesTxt = (m[2] || m[3]).toLowerCase();
  const mes = MESES_MAP[mesTxt];
  if(mes==null) return null;
  return new Date(Date.UTC(anioRef, mes, diaIni));
}

// Comprueba si existe una actividad real en ACTS para una fecha dada (cualquier deporte)
function hayActividadEnFecha(fechaISO){
  return ACTS.some(a => a.fecha === fechaISO);
}

// Busca en el texto del plan activo la sesión correspondiente a una fecha concreta (por defecto, hoy)
function getEntrenoDeFecha(fechaObjetivo){
  const texto = getPlanTexto();
  const lines = texto.split('\n');
  const anioRef = new Date().getFullYear();
  const objetivoISO = fechaObjetivo.toISOString().slice(0,10);
  let fechaSemanaActual = null;

  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    if(line.startsWith('## ') || line.startsWith('### ')){
      const headerTxt = line.startsWith('### ') ? line.slice(4).split('(')[0].trim() : line.slice(3);
      fechaSemanaActual = parseFechaSemana(headerTxt, anioRef);
    } else if(line.startsWith('- ') && fechaSemanaActual){
      const m = line.match(/^-\s*([A-Za-zÁÉÍÓÚáéíóúñÑ]+):\s*(.+)$/);
      if(m){
        const [,dia,txtRaw] = m;
        if(DIAS_MAP[dia]==null) continue;
        const fechaDia = new Date(fechaSemanaActual);
        fechaDia.setUTCDate(fechaDia.getUTCDate() + DIAS_MAP[dia]);
        if(fechaDia.toISOString().slice(0,10) === objetivoISO){
          const txt = txtRaw.replace('[DESTACADO]','').replace('[CARRERA OBJETIVO]','').trim();
          const isRest = /descanso/i.test(txt) && !/post|pre/i.test(txt.split(' ').slice(0,2).join(' '));
          return { dia, texto: txt, esDescanso: isRest, hecho: hayActividadEnFecha(objetivoISO) };
        }
      }
    }
  }
  return null; // la fecha no está cubierta por el plan activo
}

function exportarResumenImagen(){
  const s = calcStats(), d = diasObj();
  const W = 800, H = 1000;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const C = {
    bg: '#0d1f15', card: '#15291d', card2: '#1d3526', border: '#2c4734',
    gold: '#d4a843', text: '#e4ede6', muted: '#7fa68d',
    run: '#c4694a', swim: '#3d8a8a', bike: '#b8923a'
  };

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  ctx.fillStyle = C.bg;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = C.gold;
  ctx.font = 'bold 30px Arial';
  ctx.fillText('Extrena — Resumen', 40, 60);
  ctx.fillStyle = C.muted;
  ctx.font = '15px Arial';
  ctx.fillText(`Generado el ${new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})} · ${ACTS.length} actividades totales`, 40, 86);

  let y = 130;

  function tarjetaStat(x, w, label, valor, color){
    roundRect(x, y, w, 90, 10);
    ctx.fillStyle = C.card2;
    ctx.fill();
    ctx.fillStyle = color || C.gold;
    ctx.font = 'bold 26px Arial';
    ctx.fillText(String(valor), x+16, y+42);
    ctx.fillStyle = C.muted;
    ctx.font = '12px Arial';
    ctx.fillText(label.toUpperCase(), x+16, y+68);
  }

  const colW = (W-40*2-12*3)/4;
  tarjetaStat(40, colW, 'Actividades', ACTS.length);
  tarjetaStat(40+colW+12, colW, 'Horas totales', fmtH(s.horasTot));
  tarjetaStat(40+(colW+12)*2, colW, 'Carga TL', fmtInt(s.tlTot));
  tarjetaStat(40+(colW+12)*3, colW, 'Días a Don Benito', d>0?d:'¡Ya!');

  y += 120;

  tarjetaStat(40, (W-80-12*2)/3, 'Carreras · tiempo', s.c.length+' · '+fmtH(s.horasC), C.run);
  tarjetaStat(40+(W-80-12*2)/3+12, (W-80-12*2)/3, 'Natación · tiempo', s.n.length+' · '+fmtH(s.horasN), C.swim);
  tarjetaStat(40+((W-80-12*2)/3+12)*2, (W-80-12*2)/3, 'Bici · tiempo', s.b.length+' · '+fmtH(s.horasB), C.bike);

  y += 130;

  roundRect(40, y, W-80, 140, 12);
  ctx.fillStyle = C.card;
  ctx.fill();
  ctx.strokeStyle = C.gold;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = C.gold;
  ctx.font = 'bold 16px Arial';
  ctx.fillText('Objetivo: Don Benito 5km · 29 agosto 2026', 60, y+32);
  ctx.fillStyle = C.text;
  ctx.font = '14px Arial';
  ctx.fillText('Marca actual: 30:51    →    Meta: sub-28:00', 60, y+62);
  ctx.fillStyle = C.muted;
  ctx.font = '13px Arial';
  ctx.fillText('Mejora necesaria: 2:51 (~17 segundos por km)', 60, y+88);
  const semanasRest = d>0 ? Math.round(d/7) : 0;
  ctx.fillText(`Semanas restantes: ${semanasRest}`, 60, y+112);

  y += 175;

  if(s.ultimaFitness!=null){
    roundRect(40, y, W-80, 90, 10);
    ctx.fillStyle = C.card2;
    ctx.fill();
    ctx.fillStyle = C.muted;
    ctx.font = '12px Arial';
    ctx.fillText('FORMA ACTUAL', 60, y+25);
    ctx.fillStyle = C.text;
    ctx.font = '14px Arial';
    const tsb = s.ultimaFatiga!=null ? (s.ultimaFitness-s.ultimaFatiga).toFixed(1) : '—';
    ctx.fillText(`Fitness (CTL): ${s.ultimaFitness}   ·   Fatiga (ATL): ${s.ultimaFatiga??'—'}   ·   Forma (TSB): ${tsb}`, 60, y+55);
  }

  y += 110;
  ctx.fillStyle = C.muted;
  ctx.font = '11px Arial';
  ctx.fillText('Generado desde Extrena', 40, H-20);

  canvas.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `entrenador-resumen-${new Date().toISOString().slice(0,10)}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 'image/png');
}

function renderVistaPlan(){
  const cont = document.getElementById('plan-render');
  if(!cont) return;
  if(window._vistaPlan === 'calendario'){
    window._mesCalendario = window._mesCalendario || new Date();
    cont.innerHTML = renderPlanCalendario(window._mesCalendario);
    const prevBtn = document.getElementById('cal-prev'), nextBtn = document.getElementById('cal-next');
    if(prevBtn) prevBtn.addEventListener('click', ()=>{
      window._mesCalendario = new Date(window._mesCalendario.getFullYear(), window._mesCalendario.getMonth()-1, 1);
      renderVistaPlan();
    });
    if(nextBtn) nextBtn.addEventListener('click', ()=>{
      window._mesCalendario = new Date(window._mesCalendario.getFullYear(), window._mesCalendario.getMonth()+1, 1);
      renderVistaPlan();
    });
    cont.querySelectorAll('[data-cal-day]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const fecha = el.dataset.calDay;
        const [y,m,d] = fecha.split('-').map(Number);
        const info = getEntrenoDeFecha(new Date(Date.UTC(y,m-1,d)));
        if(info) alert(fecha+'\n\n'+info.texto+(info.hecho?'\n\n✓ Ya registrado':info.esDescanso?'':'\n\n○ Pendiente'));
      });
    });
  } else {
    cont.innerHTML = renderPlanHTML(getPlanTexto());
  }
}

// Genera una cuadrícula de calendario mensual con el entrenamiento de cada día (si el plan lo cubre)
function renderPlanCalendario(mesRef){
  // IMPORTANTE: todo el calendario trabaja en UTC, igual que parseFechaSemana y getEntrenoDeFecha,
  // para que nunca haya un desfase de día por zona horaria (España va por delante de UTC).
  const anio = mesRef.getUTCFullYear(), mes = mesRef.getUTCMonth();
  const primerDia = new Date(Date.UTC(anio, mes, 1));
  const ultimoDiaNum = new Date(Date.UTC(anio, mes+1, 0)).getUTCDate();
  const nombreMes = primerDia.toLocaleDateString('es-ES', {month:'long', year:'numeric', timeZone:'UTC'});

  // Offset: queremos que la semana empiece en lunes (getUTCDay() da 0=domingo)
  let offsetInicio = primerDia.getUTCDay() - 1;
  if(offsetInicio < 0) offsetInicio = 6;

  const emoji = (txt) => {
    if(/natación|nadar|piscina/i.test(txt)) return '🏊';
    if(/carrera|correr|series|fartlek/i.test(txt)) return '🏃';
    if(/bici/i.test(txt)) return '🚴';
    return '⚡';
  };

  let celdas = '';
  for(let i=0; i<offsetInicio; i++) celdas += '<div class="cal-celda cal-vacia"></div>';

  const hoy = new Date();
  const hoyISO = new Date(Date.UTC(hoy.getFullYear(), hoy.getMonth(), hoy.getDate())).toISOString().slice(0,10);
  for(let d=1; d<=ultimoDiaNum; d++){
    const fecha = new Date(Date.UTC(anio, mes, d));
    const fechaISO = fecha.toISOString().slice(0,10);
    const info = getEntrenoDeFecha(fecha);
    const esHoy = fechaISO === hoyISO;
    let contenido = '';
    let claseCelda = 'cal-celda';
    if(info && !info.esDescanso){
      // El icono del deporte SIEMPRE se muestra, hecho o no — nunca desaparece.
      // El estado (hecho/pendiente) se marca con el color de fondo de toda la celda, mucho más visible que un punto.
      claseCelda += info.hecho ? ' cal-hecho' : ' cal-pendiente';
      contenido = `<div style="font-size:1.05rem;line-height:1">${emoji(info.texto)}</div>`;
    } else if(info && info.esDescanso){
      claseCelda += ' cal-descanso';
      contenido = `<div style="font-size:.75rem;color:var(--mu);font-weight:600">—</div>`;
    }
    celdas += `<div class="${claseCelda}${esHoy?' cal-hoy':''}" data-cal-day="${fechaISO}" style="cursor:${info?'pointer':'default'}">
      <div class="cal-num">${d}</div>
      ${contenido}
    </div>`;
  }

  const diasSemana = ['L','M','X','J','V','S','D'];

  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <button class="btn btn-s btn-sm" id="cal-prev">‹</button>
      <div class="card-t" style="margin:0;text-transform:capitalize">${nombreMes}</div>
      <button class="btn btn-s btn-sm" id="cal-next">›</button>
    </div>
    <div class="cal-grid cal-grid-header">
      ${diasSemana.map(d=>`<div class="cal-celda cal-dow">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">${celdas}</div>
    <div style="display:flex;gap:1rem;margin-top:.9rem;font-size:.72rem;color:var(--mu);flex-wrap:wrap;align-items:center">
      <span style="display:flex;align-items:center;gap:.35rem"><span style="display:inline-block;width:14px;height:14px;border-radius:4px;background:rgba(212,168,67,.22);border:1px solid rgba(212,168,67,.45)"></span>Ya registrado</span>
      <span style="display:flex;align-items:center;gap:.35rem"><span style="display:inline-block;width:14px;height:14px;border-radius:4px;background:var(--s2);border:1px solid var(--bd)"></span>Pendiente</span>
      <span style="display:flex;align-items:center;gap:.35rem"><span style="display:inline-block;width:14px;height:14px;border-radius:4px;background:rgba(58,92,70,.35)"></span>Descanso</span>
    </div>
  </div>`;
}

function renderPlanHTML(texto){
  const lines = texto.split('\n');
  let html = '';
  let inWeek = false;
  let fechaSemanaActual = null; // Date del Lunes/inicio de la semana en curso
  const anioRef = new Date().getFullYear();

  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;
    if(line.startsWith('# ')) {
      html += `<div class="card-t" style="font-size:.95rem;color:var(--cy);margin-bottom:.5rem">${esc(line.slice(2))}</div>`;
    } else if(line.startsWith('## ')) {
      if(inWeek) html += '</div>';
      const headerTxt = line.slice(3);
      fechaSemanaActual = parseFechaSemana(headerTxt, anioRef);
      html += `<div class="plan-sem"><div class="plan-hdr"><div class="plan-hdr-t">${esc(headerTxt)}</div></div>`;
      inWeek = true;
    } else if(line.startsWith('### ')) {
      if(inWeek) html += '</div>';
      const txt = line.slice(4);
      const parts = txt.split('(');
      const sem = parts[0].trim();
      const bl = parts[1] ? parts[1].replace(')','').trim() : '';
      fechaSemanaActual = parseFechaSemana(sem, anioRef);
      html += `<div class="plan-sem"><div class="plan-hdr"><div class="plan-hdr-t">${esc(sem)}</div><div class="plan-hdr-b">${esc(bl)}</div></div>`;
      inWeek = true;
    } else if(line.startsWith('- ')) {
      const m = line.match(/^-\s*([A-Za-zÁÉÍÓÚáéíóúñÑ]+):\s*(.+)$/);
      if(m){
        let [,dia,txt] = m;
        const isRest = /descanso/i.test(txt) && !/post|pre/i.test(txt.split(' ').slice(0,2).join(' '));
        const isSpecial = txt.includes('[DESTACADO]');
        txt = txt.replace('[DESTACADO]','').replace('[CARRERA OBJETIVO]','').trim();
        let emoji='⚡';
        if(/natación|nadar|piscina/i.test(txt)) emoji='🏊';
        else if(/carrera|correr|series|fartlek/i.test(txt)) emoji='🏃';
        else if(/bici|ciclismo/i.test(txt)) emoji='🚴';
        else if(/descanso/i.test(txt)) emoji='—';
        else if(/viaje/i.test(txt)) emoji='✈️';
        else if(/vuelta/i.test(txt)) emoji='🏠';
        else if(/FONDO POPULAR|carrera objetivo/i.test(line)) emoji='🏆';

        // Calcular fecha real de este día y comprobar si hay actividad registrada
        let checkHtml = '';
        if(fechaSemanaActual && DIAS_MAP[dia]!=null && !isRest){
          const offset = DIAS_MAP[dia];
          const fechaDia = new Date(fechaSemanaActual);
          fechaDia.setUTCDate(fechaDia.getUTCDate() + offset);
          const fechaISO = fechaDia.toISOString().slice(0,10);
          const hecho = hayActividadEnFecha(fechaISO);
          checkHtml = hecho
            ? `<span style="color:var(--cy);margin-left:.5rem;font-weight:700" title="Entrenamiento registrado el ${fechaISO}">✓</span>`
            : `<span style="color:var(--bd);margin-left:.5rem" title="Sin registrar todavía">○</span>`;
        }

        html += `<div class="plan-dia"><div class="plan-dn">${esc(dia)}</div><div class="plan-dc ${isRest?'plan-rest':''}"><span style="margin-right:.4rem">${emoji}</span><span class="${isSpecial?'plan-sp':''}">${esc(txt)}</span>${checkHtml}</div></div>`;
      }
    } else if(line.startsWith('Periodo:') || line.startsWith('Objetivo principal:') || line.startsWith('Esquema semanal:')) {
      if(inWeek){ html+='</div>'; inWeek=false; }
      html += `<div style="font-size:.82rem;color:var(--mu);margin-bottom:.5rem">${esc(line)}</div>`;
    } else if(line.startsWith('Reloj:') || line.startsWith('Juanjo') || line.startsWith('Otras carreras') || line.startsWith('A medio plazo')) {
      if(inWeek){ html+='</div>'; inWeek=false; }
      html += `<div style="font-size:.78rem;color:var(--mu);margin-bottom:.4rem;padding-left:.5rem;border-left:2px solid var(--bd)">${esc(line)}</div>`;
    }
  });
  if(inWeek) html += '</div>';
  return html;
}

// Calcula cuántos días con entrenamiento previsto (hasta hoy) tienen actividad registrada
function renderProgresoPlan(){
  const cont = document.getElementById('plan-progress-inner');
  if(!cont) return;
  const texto = getPlanTexto();
  const lines = texto.split('\n');
  const anioRef = new Date().getFullYear();
  // hoyUTC: medianoche UTC del día de HOY en hora local — evita el desfase de zona horaria
  // (España va por delante de UTC, así que comparar contra "hoy local 00:00" excluía el propio día).
  const ahoraLocal = new Date();
  const hoyUTC = new Date(Date.UTC(ahoraLocal.getFullYear(), ahoraLocal.getMonth(), ahoraLocal.getDate()));
  let fechaSemanaActual = null;

  // Recopilamos TODOS los días previstos (no descanso) hasta hoy, en orden cronológico,
  // con su estado. Esto alimenta tanto el progreso global como el cálculo de racha.
  const diasPrevistos = [];
  lines.forEach(line=>{
    line = line.trim();
    if(line.startsWith('## ') || line.startsWith('### ')){
      const headerTxt = line.startsWith('### ') ? line.slice(4).split('(')[0].trim() : line.slice(3);
      fechaSemanaActual = parseFechaSemana(headerTxt, anioRef);
    } else if(line.startsWith('- ') && fechaSemanaActual){
      const m = line.match(/^-\s*([A-Za-zÁÉÍÓÚáéíóúñÑ]+):\s*(.+)$/);
      if(m){
        const [,dia,txt] = m;
        const isRest = /descanso/i.test(txt) && !/post|pre/i.test(txt.split(' ').slice(0,2).join(' '));
        if(isRest || DIAS_MAP[dia]==null) return;
        const fechaDia = new Date(fechaSemanaActual);
        fechaDia.setUTCDate(fechaDia.getUTCDate() + DIAS_MAP[dia]);
        if(fechaDia > hoyUTC) return; // solo contamos días ya pasados o de hoy
        const fechaISO = fechaDia.toISOString().slice(0,10);
        diasPrevistos.push({ fecha: fechaISO, hecho: hayActividadEnFecha(fechaISO) });
      }
    }
  });

  const total = diasPrevistos.length;
  const hechos = diasPrevistos.filter(d=>d.hecho).length;
  const pct = total ? Math.round(hechos/total*100) : 0;

  // Racha actual: recorremos desde el día previsto más reciente hacia atrás,
  // contando mientras estén hechos. Se corta en el primer día previsto sin registrar.
  let racha = 0;
  for(let i = diasPrevistos.length - 1; i >= 0; i--){
    if(diasPrevistos[i].hecho) racha++;
    else break;
  }

  cont.innerHTML = `
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:.5rem">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;color:var(--cy)">${hechos}/${total}</div>
      <div style="flex:1">
        <div class="pb"><div class="pb-fill" style="width:${pct}%;background:var(--cy)"></div></div>
      </div>
      <div style="font-size:.85rem;color:var(--mu);font-weight:600">${pct}%</div>
      ${racha>=2 ? `<div style="display:flex;align-items:center;gap:.3rem;background:rgba(212,168,67,.18);border:1px solid rgba(212,168,67,.4);border-radius:20px;padding:.25rem .7rem;white-space:nowrap"><span>🔥</span><span style="font-size:.8rem;font-weight:700;color:var(--cy)">${racha}</span></div>` : ''}
    </div>
    <div style="font-size:.78rem;color:var(--mu)">Sesiones previstas hasta hoy que ya tienes registradas con datos reales.${racha>=2?` Llevas ${racha} sesiones seguidas sin fallar.`:''}</div>
  `;
}

  box.scrollTop=box.scrollHeight;
}

async function enviarPlanChat(){
  const inp=document.getElementById('plan-chat-in');
  const btn=document.getElementById('btn-plan-send');
  const txt=inp.value.trim(); if(!txt) return;
  inp.value=''; addPlanMsg('user',txt);
  btn.disabled=true; btn.textContent='...';
  document.getElementById('spin-plan').classList.add('on');

  const sysPrompt = `Eres un asistente que edita un plan de entrenamiento de triatlon/running en formato markdown plano. Reglas estrictas:
1. Te paso el plan ACTUAL completo del plan que esta editando Juanjo, y una peticion de cambio.
2. Debes devolver el plan COMPLETO reescrito con el cambio aplicado, en el MISMO formato markdown (# titulo, ## o ### para semanas con fechas, - Dia: descripcion).
3. Marca sesiones importantes (series, carreras objetivo, fartlek clave) anadiendo [DESTACADO] al final de la linea. La carrera objetivo principal lleva ademas [CARRERA OBJETIVO].
4. Manten todo lo que no se pida cambiar exactamente igual.
5. Responde UNICAMENTE con el plan markdown completo, sin explicaciones antes ni despues, y sin envolverlo en bloques de codigo de ningun tipo.
6. Si la peticion es ambigua, usa tu mejor criterio de entrenador y aplicala de forma razonable.
7. Si Juanjo pide crear un plan totalmente nuevo (ej. para un futuro duatlon), puedes reescribir el plan desde cero respetando solo el titulo del plan activo.

Contexto de Juanjo: multideportista popular de Villanueva de la Serena, tambien opositor de lengua y literatura. Interes futuro en debutar en duatlon/triatlon.

PLAN ACTUAL (plan activo: "${getPlanActivo().nombre}"):
${getPlanTexto()}`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:4000,system:sysPrompt,
        messages:[{role:'user',content:'Peticion de cambio: '+txt}]})});
    const d=await r.json();
    const nuevoTexto=(d.content?.map(b=>b.text||'').join('')||'').trim();
    if(nuevoTexto.length>100){
      setPlanTexto(nuevoTexto);
      planChatHistory.push({role:'user',content:txt,displayText:txt});
      planChatHistory.push({role:'assistant',content:'Plan actualizado.',displayText:'✅ Plan actualizado. Revisa los cambios abajo.'});
      setPlanChat(planChatHistory);
      addPlanMsg('ai','✅ Plan actualizado. Revisa los cambios abajo.');
      document.getElementById('plan-render').innerHTML = renderPlanHTML(getPlanTexto());
      renderProgresoPlan();
    } else {
      addPlanMsg('ai','❌ No pude generar un plan valido, prueba a reformular la peticion.');
    }
  }catch(e){
    addPlanMsg('ai','❌ Error: '+e.message);
  }finally{
    btn.disabled=false; btn.textContent='Enviar';
    document.getElementById('spin-plan').classList.remove('on');
  }
}
