function openDetail(i){
  const a=window._histDatos[i];
  const overlay=document.getElementById('detail-overlay');
  const content=document.getElementById('detail-content');
  const emoji={Carrera:'🏃',Natación:'🏊',Bicicleta:'🚴',Caminata:'🚶',Senderismo:'🥾'}[a.tipo]||'⚡';
  const c=col[a.tipo]||'#8a9a7a';

  // Construir filas dinámicamente con TODOS los campos disponibles en esta actividad,
  // así nunca se omite nada que el dato traiga, sea cual sea su origen (Strava, Intervals, FIT manual)
  const rows=[];
  rows.push(['Fecha', a.fecha]);
  rows.push(['Tipo', a.tipo]);
  rows.push(['Distancia', a.tipo==='Natación' ? (a.distancia??'—')+' m' : (a.distancia??'—')+' km']);
  rows.push(['Duración', a.duracion_min!=null ? a.duracion_min+' min' : '—']);
  if(a.ritmo_min_km!=null) rows.push(['Ritmo medio', fmtMinKm(a.ritmo_min_km)+' /km']);
  if(a.vel_kmh!=null) rows.push(['Velocidad media', fmtInt(a.vel_kmh)+' km/h']);
  rows.push(['FC media', a.fc_media!=null ? a.fc_media+' ppm' : 'sin datos']);
  if(a.fc_min!=null) rows.push(['FC mínima', a.fc_min+' ppm']);
  rows.push(['FC máxima', a.fc_max!=null ? a.fc_max+' ppm' : 'sin datos']);
  rows.push(['Desnivel', a.desnivel!=null ? fmtInt(a.desnivel)+' m' : '—']);
  rows.push(['Calorías', a.calorias!=null ? a.calorias+' kcal' : '—']);
  rows.push(['Carga (Training Load)', a.training_load!=null ? a.training_load+(a.zonas_estimadas?' (estimada)':'') : 'no calculada']);
  rows.push(['Intensidad', a.intensidad!=null ? a.intensidad+'%' : 'no calculada']);
  if(a.zona_dominante!=null) rows.push(['Zona dominante', 'Z'+a.zona_dominante]);
  if(a.fitness!=null) rows.push(['Fitness (CTL) tras sesión', a.fitness]);
  if(a.fatiga!=null) rows.push(['Fatiga (ATL) tras sesión', a.fatiga]);
  if(a.race) rows.push(['Competición', 'Sí']);
  if(a.notas) rows.push(['Notas', a.notas]);

  let zonasHtml='';
  if(a.fc_z1s!=null){
    // Zonas dinámicas: 5 si solo hay hasta Z5 (estimadas), hasta 7 si vienen de Intervals.icu (Z6/Z7 incluidas)
    const zlblFull=['Z1 Suave','Z2 Base','Z3 Tempo','Z4 Umbral','Z5 VO2max','Z6 Anaeróbico','Z7 Máximo'];
    const zcolFull=['#4a6b52','#6fae6f','#a8b84a','#d4a843','#d68a3a','#c4622f','#8e2f1f'];
    const zsFull=[a.fc_z1s,a.fc_z2s,a.fc_z3s,a.fc_z4s,a.fc_z5s,a.fc_z6s,a.fc_z7s];
    const nZonas = (a.fc_z6s!=null || a.fc_z7s!=null) ? 7 : 5;
    const zs = zsFull.slice(0,nZonas).map(v=>v||0);
    const zlbl = zlblFull.slice(0,nZonas);
    const zcol = zcolFull.slice(0,nZonas);
    const tot=zs.reduce((s,v)=>s+v,0)||1;
    const tituloZonas = a.zonas_estimadas
      ? 'Zonas de frecuencia cardíaca <span style="color:var(--mu);font-weight:400;font-size:.7rem">(estimadas con LTHR 172, no son las de Intervals.icu)</span>'
      : 'Zonas de frecuencia cardíaca';
    zonasHtml=`<div class="card-t" style="margin-top:1rem">${tituloZonas}</div>`+
      zlbl.map((l,idx)=>{
        const min=(zs[idx]/60).toFixed(1);
        const pct=((zs[idx]/tot)*100).toFixed(0);
        return zonaBar(l+' ('+min+' min)', pct, zcol[idx]);
      }).join('');
  }

  let splitsHtml='';
  if(a.splits_km && a.splits_km.length){
    splitsHtml=`<div class="card-t" style="margin-top:1rem">Ritmo por kilómetro</div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem">`+
      a.splits_km.map((v,idx)=>`<div class="stat" style="flex:1;min-width:60px;padding:.6rem .4rem">
          <div class="v" style="font-size:1rem;color:${c}">${fmtMinKm(v)}</div>
          <div class="l">Km ${idx+1}</div>
        </div>`).join('')+
      `</div>`;
  }

  content.innerHTML=`
    <div class="detail-hdr">
      <div>
        <div class="detail-title">${emoji} ${a.nombre}${a.race?' 🏆':''}</div>
        <div class="detail-sub">${a.fecha} · ${a.tipo}</div>
      </div>
      <button class="detail-close" id="detail-close-btn">✕</button>
    </div>
    <div>${rows.map(([l,v])=>`<div class="detail-row"><span>${l}</span><span style="color:${c}">${v}</span></div>`).join('')}</div>
    ${splitsHtml}
    ${zonasHtml}
    <div class="card-t" style="margin-top:1rem">Sensaciones / notas</div>
    <textarea id="detail-notas" rows="3" placeholder="¿Cómo te sentiste? Piernas, calor, ánimo...">${esc(getNotaExtra(a))}</textarea>
    <button class="btn btn-s btn-sm" id="detail-guardar-nota" style="margin-top:.5rem">💾 Guardar nota</button>
    <div style="display:flex;gap:.6rem;margin-top:1.25rem;flex-wrap:wrap">
      <button class="btn btn-p btn-sm" id="detail-analyze-btn">🤖 Analizar con IA</button>
      ${!ACTS_BASE.some(b=>b.fecha===a.fecha&&b.tipo===a.tipo&&Math.abs((b.distancia||0)-(a.distancia||0))<0.05) ? `<button class="btn btn-sm" id="detail-borrar-btn" style="background:rgba(196,105,74,.15);color:#c4694a;border:1px solid rgba(196,105,74,.3)">🗑 Borrar actividad</button>` : ''}
    </div>
    <div class="spin-wrap" id="spin-detail"><div class="spin"></div>Analizando...</div>
    <div class="ai-box" id="resp-detail"></div>
  `;

  document.getElementById('detail-close-btn').addEventListener('click', closeDetail);
  document.getElementById('detail-analyze-btn').addEventListener('click', ()=>analizarDetalle(a));
  const btnBorrar = document.getElementById('detail-borrar-btn');
  if(btnBorrar) btnBorrar.addEventListener('click', ()=>{
    if(!confirm('¿Borrar esta actividad? No se puede deshacer.')) return;
    const local = JSON.parse(localStorage.getItem('trainai')||'[]');
    // Borrar solo la primera coincidencia exacta (no todas las duplicadas)
    let borrado = false;
    const nuevaLista = local.filter(b=>{
      if(!borrado && b.fecha===a.fecha && b.tipo===a.tipo && Math.abs((b.distancia||0)-(a.distancia||0))<0.05 && (b.duracion_min===a.duracion_min)){
        borrado = true; return false;
      }
      return true;
    });
    localStorage.setItem('trainai', JSON.stringify(nuevaLista));
    ACTS = [...ACTS_BASE, ...nuevaLista];
    closeDetail();
    renderHist();
    alert('✅ Actividad borrada.');
  });
  document.getElementById('detail-guardar-nota').addEventListener('click', ()=>{
    const txt = document.getElementById('detail-notas').value.trim();
    setNotaExtra(a, txt);
    alert('✅ Nota guardada.');
  });
  overlay.classList.add('on');
}

// Notas extra: se guardan aparte (indexadas por fecha+tipo) para poder anotar
// CUALQUIER actividad, incluidas las 105 que vienen incrustadas de solo lectura en ACTS_BASE.
function notaKey(a){ return a.fecha+'|'+a.tipo; }
function getNotasExtra(){
  try{ return JSON.parse(localStorage.getItem('trainai_notas')||'{}'); }catch(e){ return {}; }
}
function getNotaExtra(a){
  const notas = getNotasExtra();
  const guardada = notas[notaKey(a)];
  if(guardada != null) return guardada; // la nota editada por el usuario tiene prioridad una vez existe
  return a.notas || ''; // si nunca se ha editado, se muestra la nota original (técnica o manual) como punto de partida
}

function guardarAct(analizar){
  const dep=document.getElementById('r-dep').value;
  const fecha=document.getElementById('r-fecha').value;
  const dist=parseFloat(document.getElementById('r-dist').value)||0;
  const dur=parseFloat(document.getElementById('r-dur').value)||0;
  const fc=parseInt(document.getElementById('r-fc').value)||null;
  const fcmax=parseInt(document.getElementById('r-fcmax').value)||null;
  const cal=parseInt(document.getElementById('r-cal').value)||null;
  const des=parseFloat(document.getElementById('r-des').value)||0;
  const tl=parseInt(document.getElementById('r-tl').value)||null;
  const vel=parseFloat(document.getElementById('r-vel').value)||null;
  const notas=document.getElementById('r-notas').value;
  if(!fecha||!dur){alert('Completa al menos fecha y duración.');return;}
  const act={fecha,tipo:dep,nombre:dep+' '+fecha,distancia:dist,duracion_min:dur,
    fc_media:fc,fc_max:fcmax,calorias:cal,desnivel:des,training_load:tl,
    fitness:null,fatiga:null,intensidad:null,fc_z1s:null,fc_z2s:null,fc_z3s:null,fc_z4s:null,fc_z5s:null,race:false};
  if(dep==='Carrera'&&dist&&dur) act.ritmo_min_km=parseFloat((dur/dist).toFixed(2));
  if(dep==='Bicicleta'&&dist&&dur) act.vel_kmh=vel||parseFloat((dist/(dur/60)).toFixed(1));
  if(dep==='Bicicleta'&&vel) act.vel_kmh=vel;
  if(notas) act.notas=notas;
  const local=JSON.parse(localStorage.getItem('trainai')||'[]');
  local.unshift(act);localStorage.setItem('trainai',JSON.stringify(local));
  ACTS=[act,...ACTS_BASE,...JSON.parse(localStorage.getItem('trainai')||'[]').slice(1)];
  alert('✅ '+dep+' del '+fecha+' guardada.');
  // Refrescar Datos/Historial/Plan por si están visibles, para que reflejen la nueva actividad al instante
  if(document.getElementById('tab-plan').classList.contains('on')) buildPlan();
  if(analizar){
    const p=`Juanjo acaba de registrar esta actividad. Analízala y da feedback detallado:\nDeporte: ${dep} | Fecha: ${fecha}\nDistancia: ${dist}${dep==='Natación'?'m':'km'} | Duración: ${dur}min\nFC media: ${fc||'—'} | FC máx: ${fcmax||'—'} | Desnivel: ${des}m | Calorías: ${cal||'—'}\n${notas?'Sensaciones: '+notas:''}`;
    callIA(p,'spin-reg','resp-reg');
  }
}

function handleFile(e){
  const file=e.target.files[0]; if(!file) return;
  const esFit = /\.fit$/i.test(file.name);
  const esCsv = /\.csv$/i.test(file.name);

  if(esFit){
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const tipoSel = document.getElementById('r-dep').value;
        const act = fitToActivity(ev.target.result, tipoSel);
        // Avisar si el tipo seleccionado no parece coincidir con el archivo
        if(tipoSel !== 'Natación' && file.name.toLowerCase().includes('swim')) {
          if(confirm('El archivo parece ser de natación pero tienes seleccionado "'+tipoSel+'". ¿Cambiar a Natación?')){
            document.getElementById('r-dep').value = 'Natación';
            const actNat = fitToActivity(ev.target.result, 'Natación');
            mostrarPreviewFit(actNat, file.name);
            return;
          }
        }
        mostrarPreviewFit(act, file.name);
      }catch(err){
        alert('No se pudo leer este archivo FIT: '+err.message+'\n\nPuedes pegar los datos manualmente en el campo de texto, o subir el archivo aquí para analizarlo con la IA.');
      }
    };
    reader.readAsArrayBuffer(file);
  } else if(esCsv){
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const acts = intervalsCSVToActivities(ev.target.result);
        mostrarPreviewCSV(acts, file.name);
      }catch(err){
        alert('No se pudo leer este CSV: '+err.message+'\n\nAsegúrate de que es una exportación de actividades de Intervals.icu (Settings → algo similar a Export → Activities CSV).');
      }
    };
    reader.readAsText(file);
  } else {
    // GPX / TCX / otros: seguimos con el flujo de texto + IA, no garantizamos parseo automático
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('r-raw').value = ev.target.result.slice(0,3000);
      alert('Archivo cargado como texto. Para GPX/TCX usa el botón "Analizar datos" — el guardado automático directo solo está disponible para archivos .FIT y .CSV de Intervals.icu.');
    };
    reader.readAsText(file);
  }
}

function guardarActividadDirecta(act){
  const local = JSON.parse(localStorage.getItem('trainai')||'[]');
  const yaExiste = ACTS.some(a => a.fecha===act.fecha && a.tipo===act.tipo && Math.abs((a.distancia||0)-(act.distancia||0))<0.05);
  if(yaExiste){
    if(!confirm('Ya existe una actividad de '+act.tipo+' el '+act.fecha+' con distancia similar. ¿Guardarla de todas formas?')) return;
  }
  local.unshift(act);
  localStorage.setItem('trainai', JSON.stringify(local));
  ACTS = [act, ...ACTS_BASE, ...JSON.parse(localStorage.getItem('trainai')||'[]').slice(1)];
  alert('✅ '+act.tipo+' del '+act.fecha+' guardada directamente desde el archivo.');
  if(document.getElementById('tab-plan').classList.contains('on')) buildPlan();
  if(document.getElementById('tab-hist').classList.contains('on')) renderHist();
}

  const duplicadas = acts.length - nuevas.length;
  const emoji = {Carrera:'🏃',Natación:'🏊',Bicicleta:'🚴',Caminata:'🚶',Senderismo:'🥾'};

  cont.style.display = 'block';
  cont.innerHTML = `
    <div class="card-t" style="color:var(--cy)">📋 Vista previa — ${esc(filename)}</div>
    <div class="g3" style="gap:.6rem;margin-bottom:.9rem">
      ${stat(acts.length,'Actividades en el archivo')}
      ${stat(nuevas.length,'Nuevas (no duplicadas)','v-c')}

          ${acts.slice(0,30).map(a=>{
            const dup = !nuevas.includes(a);
            return `<tr style="${dup?'opacity:.45':''}">
              <td>${emoji[a.tipo]||'⚡'}</td>
              <td style="font-size:.74rem;color:var(--mu)">${a.fecha}</td>
              <td style="font-size:.78rem">${a.tipo}</td>
              <td style="font-size:.78rem">${a.tipo==='Natación'?(a.distancia||'—')+'m':(a.distancia||'—')+'km'}</td>
              <td style="font-size:.78rem">${a.duracion_min||'—'}min</td>
              <td style="font-size:.7rem">${dup?'<span style=\"color:var(--ye)\">ya existe</span>':'<span style=\"color:var(--cy)\">nueva</span>'}</td>
            </tr>`;
          }).join('')}
          ${acts.length>30?`<tr><td colspan="6" style="text-align:center;color:var(--mu);font-size:.75rem;padding:.6rem">… y ${acts.length-30} más</td></tr>`:''}
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:.6rem;flex-wrap:wrap">
      <button class="btn btn-p btn-sm" id="btn-importar-csv">💾 Importar ${nuevas.length} actividad${nuevas.length===1?'':'es'} nueva${nuevas.length===1?'':'s'}</button>

    cont.style.display='none'; cont.innerHTML=''; document.getElementById('r-file').value='';

  if(btnTodas) btnTodas.addEventListener('click', ()=>{
    importarActividadesLote(window._csvPendiente.acts);
    cont.style.display='none'; cont.innerHTML=''; document.getElementById('r-file').value='';
  });
  document.getElementById('btn-descartar-csv').addEventListener('click', ()=>{
    cont.style.display='none'; cont.innerHTML=''; window._csvPendiente=null; document.getElementById('r-file').value='';
  });

function importarActividadesLote(nuevasActs){
  if(!nuevasActs.length){ alert('No hay actividades nuevas que importar.'); return; }
  const local = JSON.parse(localStorage.getItem('trainai')||'[]');
  local.unshift(...nuevasActs);
  localStorage.setItem('trainai', JSON.stringify(local));
  ACTS = [...nuevasActs, ...ACTS_BASE, ...JSON.parse(localStorage.getItem('trainai')||'[]').slice(nuevasActs.length)];
  alert('✅ '+nuevasActs.length+' actividad(es) importada(s) desde el CSV de Intervals.icu.');
  if(document.getElementById('tab-plan').classList.contains('on')) buildPlan();
  if(document.getElementById('tab-hist').classList.contains('on')) renderHist();
  if(document.getElementById('tab-datos').classList.contains('on')) buildDatos();
}

// BACKUP / EXPORTAR / IMPORTAR (sincronización manual entre dispositivos)
// ─────────────────────────────────────────────
const BACKUP_KEYS = ['trainai', 'trainai_planes', 'trainai_plan_activo', 'trainai_notas', 'trainai_apikey'];

function exportarBackup(){
  const datos = {
    version: 1,
    exportado_en: new Date().toISOString(),
    app: 'Extrena',
  };
  BACKUP_KEYS.forEach(k => { datos[k] = localStorage.getItem(k); });

  const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const fecha = new Date().toISOString().slice(0,10);
  a.download = `entrenador-backup-${fecha}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importarBackup(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const datos = JSON.parse(ev.target.result);
      if(datos.version !== 1 || !BACKUP_KEYS.some(k => datos[k] != null)){
        alert('Este archivo no parece un backup válido de esta app.');
        return;
      }
      const nActividades = datos.trainai ? JSON.parse(datos.trainai).length : 0;
      const nPlanes = datos.trainai_planes ? JSON.parse(datos.trainai_planes).length : 0;
      if(!confirm(`Este backup contiene ${nActividades} actividad(es) añadidas a mano y ${nPlanes} plan(es), del ${datos.exportado_en ? datos.exportado_en.slice(0,10) : 'fecha desconocida'}.\n\n¿Importar? Esto SOBRESCRIBIRÁ los datos actuales de este navegador.`)) return;

      BACKUP_KEYS.forEach(k => {
        if(datos[k] != null) localStorage.setItem(k, datos[k]);
      });
      alert('✅ Backup importado. La página se recargará para aplicar los cambios.');
      location.reload();
    } catch(err) {
      alert('No se pudo leer este archivo: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function actualizarInfoBackup(){
  const el = document.getElementById('backup-info');
  if(!el) return;
  const local = JSON.parse(localStorage.getItem('trainai')||'[]');
  const planes = JSON.parse(localStorage.getItem('trainai_planes')||'[]');
  el.textContent = `${local.length} actividad(es) y ${planes.length} plan(es) en este navegador.`;
}

  const modal = document.createElement('div');
  modal.id = 'modal-objetivo';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem';
  modal.innerHTML = `
    <div style="background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:1.5rem;max-width:380px;width:100%">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:var(--cy);margin-bottom:.9rem">🎯 Objetivo principal</div>
      <div style="font-size:.78rem;color:var(--mu);margin-bottom:.3rem">Nombre de la carrera</div>
      <input id="obj-nombre" type="text" value="${obj.nombre}" placeholder="Don Benito, Nocturna Zurbarán..."
        style="width:100%;box-sizing:border-box;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:.6rem .8rem;font-size:.85rem;margin-bottom:.75rem">
      <div style="font-size:.78rem;color:var(--mu);margin-bottom:.3rem">Fecha de la carrera</div>
      <input id="obj-fecha" type="date" value="${obj.fecha}"
        style="width:100%;box-sizing:border-box;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:.6rem .8rem;font-size:.85rem;margin-bottom:.9rem">
      <div style="display:flex;gap:.6rem">
        <button id="btn-guardar-obj" class="btn btn-p btn-sm" style="flex:1">💾 Guardar</button>
        <button id="btn-cerrar-obj" class="btn btn-s btn-sm">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('btn-guardar-obj').addEventListener('click', ()=>{
    const nombre = document.getElementById('obj-nombre').value.trim();
    const fecha = document.getElementById('obj-fecha').value;
    if(!nombre || !fecha){ alert('Introduce nombre y fecha.'); return; }
    setObjetivo(nombre, fecha);
    modal.remove();
    // Actualizar el header inmediatamente
    const d = diasObj();
    const diasEl = document.getElementById('dias-hdr');
    diasEl.textContent = d>0 ? d+' días para '+nombreObj() : '¡'+nombreObj()+' hoy!';
    // Recargar Datos si está visible
    if(document.getElementById('tab-datos').classList.contains('on')) buildDatos();
  });
  document.getElementById('btn-cerrar-obj').addEventListener('click', ()=>modal.remove());
}

function mostrarModalApiKey(mensajeExtra){
  const existing = document.getElementById('modal-apikey');
  if(existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'modal-apikey';
  modal.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem`;
  modal.innerHTML = `
    <div style="background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:1.5rem;max-width:420px;width:100%">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:var(--cy);margin-bottom:.5rem">🔑 API Key de Anthropic</div>
      ${mensajeExtra ? `<div style="font-size:.8rem;color:#c4622f;margin-bottom:.75rem">${mensajeExtra}</div>` : ''}
      <div style="font-size:.8rem;color:var(--mu);margin-bottom:.9rem">Introduce tu API key de <a href="https://console.anthropic.com" target="_blank" style="color:var(--cy)">console.anthropic.com</a>. Se guarda solo en este dispositivo.</div>
      <input id="input-apikey" type="password" placeholder="sk-ant-..." value="${getApiKey()}"
        style="width:100%;box-sizing:border-box;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:.6rem .8rem;font-size:.85rem;margin-bottom:.9rem">
      <div style="display:flex;gap:.6rem">
        <button id="btn-guardar-apikey" class="btn btn-p btn-sm" style="flex:1">💾 Guardar</button>
        ${getApiKey() ? `<button id="btn-cerrar-apikey" class="btn btn-s btn-sm">Cancelar</button>` : ''}
      </div>
    </div>`;
  document.body.appendChild(modal);

  document.getElementById('btn-guardar-apikey').addEventListener('click', ()=>{
    const k = document.getElementById('input-apikey').value.trim();
    if(!k.startsWith('sk-ant-')){ alert('La API key debe empezar por sk-ant-'); return; }
    setApiKey(k);
    modal.remove();
  });
  const btnCerrar = document.getElementById('btn-cerrar-apikey');
  if(btnCerrar) btnCerrar.addEventListener('click', ()=>modal.remove());
}

// Añade el botón de configuración de API key en el header
function addApiKeyBtn(){
  // Añadir el botón de API key dentro del div de la derecha (último div del header)
  const header = document.querySelector('header');
  if(!header) return;
  const rightDiv = header.querySelector('div:last-child');
  const btn = document.createElement('button');
  btn.className = 'btn btn-s btn-sm';
  btn.style.fontSize = '.72rem';
  btn.textContent = '🔑';
  btn.title = 'Configurar API Key';
  btn.addEventListener('click', ()=>mostrarModalApiKey());
  if(rightDiv) rightDiv.appendChild(btn);
  else header.appendChild(btn);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  // Días en header
  const d=diasObj();
  const diasEl = document.getElementById('dias-hdr');
  const obj = getObjetivo();
  diasEl.textContent = d>0 ? d+' días para '+obj.nombre : '¡'+obj.nombre+' hoy!';
  diasEl.title = 'Pulsa para cambiar el objetivo';
  diasEl.style.cursor = 'pointer';
  diasEl.onclick = ()=>mostrarModalObjetivo();

  buildNav();
  addApiKeyBtn();
  buildChat();
  buildDatos();
  buildLogros();
  buildPlan();
  buildHist();
  buildReg();

  // Si no hay API key configurada, mostrar el modal al arrancar
  if(!getApiKey()) mostrarModalApiKey('Para usar el chat con la IA necesitas introducir tu API key de Anthropic.');

  showTab('chat');
});
</script>
</body>
</html>
